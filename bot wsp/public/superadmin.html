<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin — WhatsApp Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    nav { background: #1e293b; border-bottom: 1px solid #7c3aed; padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 12px; }
    .nav-brand { font-weight: 700; color: #a78bfa; font-size: 16px; margin-right: auto; }
    .nav-badge { background: #4c1d95; color: #c4b5fd; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.05em; }
    .nav-logout { background: none; border: 1px solid #334155; color: #94a3b8; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
    .nav-logout:hover { color: #f1f5f9; border-color: #475569; }

    .content { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .section-header h2 { font-size: 20px; font-weight: 700; }
    .section-header p { color: #64748b; font-size: 13px; margin-top: 2px; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover { background: #6d28d9; }
    .btn-secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    .btn-secondary:hover { background: #334155; }
    .btn-danger { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .btn-danger:hover { background: #7f1d1d; color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-warning { background: #1c1917; color: #fbbf24; border: 1px solid #78350f; }
    .btn-warning:hover { background: #78350f; color: #fef3c7; }

    .card { background: #1e293b; border-radius: 10px; border: 1px solid #334155; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 16px; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #334155; }
    td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #1a2540; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a2540; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-purple { background: #4c1d95; color: #c4b5fd; }
    .badge-gray { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .badge-green { background: #052e16; color: #4ade80; }

    .stat { color: #64748b; font-size: 12px; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1e293b; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid #334155; }
    .modal-header h3 { font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #334155; display: flex; justify-content: flex-end; gap: 10px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 500; color: #94a3b8; }
    input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 9px 12px; color: #f1f5f9; font-size: 14px; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: #7c3aed; }
    .hint { font-size: 12px; color: #475569; }

    #toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px 18px; font-size: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: all 0.3s; opacity: 0; transform: translateY(10px); pointer-events: none; z-index: 200; }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: #7c3aed; color: #a78bfa; }
    #toast.error { border-color: #ef4444; color: #ef4444; }

    .empty { text-align: center; padding: 48px; color: #64748b; font-size: 15px; }

    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .content { padding: 16px; } }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">⚡ Super Admin</div>
  <span class="nav-badge">SUPERADMIN</span>
  <button class="nav-logout" onclick="logout()">Salir</button>
</nav>

<div class="content">
  <div class="section-header">
    <div>
      <h2>Negocios registrados</h2>
      <p id="tenantCount"></p>
    </div>
    <button class="btn btn-primary" onclick="openCreate()">+ Nuevo Negocio</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Negocio</th>
          <th>Usuario</th>
          <th>Phone Number ID</th>
          <th>Productos / FAQs</th>
          <th>Registrado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tenantsBody"></tbody>
    </table>
  </div>
</div>

<!-- CREATE / EDIT MODAL -->
<div class="modal-overlay" id="tenantModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Nuevo Negocio</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field full">
          <label>Nombre del negocio *</label>
          <input type="text" id="m_storeName" placeholder="Ej: Auto Parts Lima" />
        </div>
        <div class="field">
          <label>Usuario (login) *</label>
          <input type="text" id="m_username" placeholder="admin@negocio" />
        </div>
        <div class="field">
          <label id="m_passwordLabel">Contraseña *</label>
          <input type="password" id="m_password" placeholder="••••••••" autocomplete="new-password" />
          <span class="hint" id="m_passwordHint"></span>
        </div>
        <div class="field full">
          <label>URL del sitio web</label>
          <input type="url" id="m_websiteUrl" placeholder="https://negocio.com" />
        </div>
        <div class="field full" style="border-top:1px solid #334155;padding-top:14px;margin-top:4px">
          <label style="color:#64748b;font-size:12px;font-weight:700;letter-spacing:.05em">CREDENCIALES WHATSAPP (META)</label>
        </div>
        <div class="field full">
          <label>Token de acceso *</label>
          <input type="password" id="m_whatsappToken" placeholder="EAAemx..." autocomplete="new-password" />
        </div>
        <div class="field">
          <label>Phone Number ID *</label>
          <input type="text" id="m_phoneNumberId" placeholder="994411380422057" />
        </div>
        <div class="field">
          <label>Verify Token *</label>
          <input type="text" id="m_verifyToken" placeholder="verify_negocio_2024" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveTenant()">Crear Negocio</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const token = localStorage.getItem('sa_token');
  if (!token) location.href = '/superadmin-login.html';

  let tenants = [];
  let editingId = null;

  function logout() {
    localStorage.removeItem('sa_token');
    location.href = '/superadmin-login.html';
  }

  function api(path, opts = {}) {
    return fetch(path, {
      ...opts,
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...(opts.headers || {}) },
    }).then(async (r) => {
      if (r.status === 401 || r.status === 403) { logout(); return; }
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || r.statusText);
      return data;
    });
  }

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.className = '', 2800);
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(iso) {
    try { return new Date(iso).toLocaleDateString('es-PE', { day:'2-digit', month:'short', year:'numeric' }); }
    catch { return iso || '—'; }
  }

  async function loadTenants() {
    tenants = await api('/superadmin/tenants');
    document.getElementById('tenantCount').textContent = tenants.length + ' negocio(s) registrado(s)';
    const tbody = document.getElementById('tenantsBody');
    if (!tenants.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty">No hay negocios registrados aún.</div></td></tr>';
      return;
    }
    tbody.innerHTML = tenants.map(t => `
      <tr>
        <td>
          <strong>${esc(t.storeName)}</strong>
          ${t.websiteUrl ? `<div style="font-size:12px;color:#64748b;margin-top:2px">${esc(t.websiteUrl)}</div>` : ''}
        </td>
        <td><span class="badge badge-gray">${esc(t.username)}</span></td>
        <td style="font-size:12px;color:#64748b;font-family:monospace">${esc(t.phoneNumberId) || '—'}</td>
        <td>
          <span class="badge badge-purple">${t.productCount} prod.</span>
          <span class="badge badge-gray" style="margin-left:4px">${t.faqCount} FAQ</span>
        </td>
        <td class="stat">${fmtDate(t.createdAt)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-warning btn-sm" onclick="openEdit('${esc(t.id)}')">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="deleteTenant('${esc(t.id)}','${esc(t.storeName)}')">Eliminar</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function openCreate() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Nuevo Negocio';
    document.getElementById('modalSaveBtn').textContent = 'Crear Negocio';
    document.getElementById('m_passwordLabel').textContent = 'Contraseña *';
    document.getElementById('m_passwordHint').textContent = '';
    ['m_storeName','m_username','m_password','m_websiteUrl','m_whatsappToken','m_phoneNumberId','m_verifyToken']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('tenantModal').classList.add('open');
  }

  function openEdit(id) {
    const t = tenants.find(x => x.id === id);
    if (!t) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Editar Negocio';
    document.getElementById('modalSaveBtn').textContent = 'Guardar cambios';
    document.getElementById('m_passwordLabel').textContent = 'Nueva contraseña';
    document.getElementById('m_passwordHint').textContent = 'Dejar vacío para no cambiar';
    document.getElementById('m_storeName').value = t.storeName || '';
    document.getElementById('m_username').value = t.username || '';
    document.getElementById('m_password').value = '';
    document.getElementById('m_websiteUrl').value = t.websiteUrl || '';
    document.getElementById('m_whatsappToken').value = '';
    document.getElementById('m_phoneNumberId').value = t.phoneNumberId || '';
    document.getElementById('m_verifyToken').value = t.verifyToken || '';
    document.getElementById('tenantModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('tenantModal').classList.remove('open');
  }

  document.getElementById('tenantModal').addEventListener('click', e => {
    if (e.target === document.getElementById('tenantModal')) closeModal();
  });

  async function saveTenant() {
    const storeName = document.getElementById('m_storeName').value.trim();
    const username = document.getElementById('m_username').value.trim();
    const password = document.getElementById('m_password').value;
    const websiteUrl = document.getElementById('m_websiteUrl').value.trim();
    const whatsappToken = document.getElementById('m_whatsappToken').value.trim();
    const phoneNumberId = document.getElementById('m_phoneNumberId').value.trim();
    const verifyToken = document.getElementById('m_verifyToken').value.trim();

    if (!editingId) {
      if (!storeName || !username || !password || !whatsappToken || !phoneNumberId || !verifyToken) {
        toast('Todos los campos marcados con * son requeridos', 'error');
        return;
      }
    }

    const body = {};
    if (storeName) body.storeName = storeName;
    if (username) body.username = username;
    if (password) body.password = password;
    if (websiteUrl !== undefined) body.websiteUrl = websiteUrl;
    if (whatsappToken) body.whatsappToken = whatsappToken;
    if (phoneNumberId) body.phoneNumberId = phoneNumberId;
    if (verifyToken) body.verifyToken = verifyToken;

    try {
      if (editingId) {
        await api('/superadmin/tenants/' + editingId, { method: 'PUT', body: JSON.stringify(body) });
        toast('Negocio actualizado');
      } else {
        await api('/superadmin/tenants', { method: 'POST', body: JSON.stringify(body) });
        toast('Negocio creado');
      }
      closeModal();
      loadTenants();
    } catch (ex) { toast(ex.message, 'error'); }
  }

  async function deleteTenant(id, name) {
    if (!confirm('¿Eliminar el negocio "' + name + '"?\nEsta acción no se puede deshacer.')) return;
    try {
      await api('/superadmin/tenants/' + id, { method: 'DELETE' });
      toast('Negocio eliminado');
      loadTenants();
    } catch (ex) { toast(ex.message, 'error'); }
  }

  loadTenants();
</script>
</body>
</html>
