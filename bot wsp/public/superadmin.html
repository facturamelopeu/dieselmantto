<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin</title>
  <style>
    :root {
      --primary: #7c3aed;
      --primary-hover: #6822d0;
      --on-primary: #ffffff;
      --primary-dim: rgba(124,58,237,0.13);
      --primary-soft: #a78bfa;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    nav { background: #1e293b; border-bottom: 2px solid var(--primary); padding: 0 16px; display: flex; align-items: center; height: 56px; gap: 10px; flex-wrap: nowrap; }
    .nav-brand { font-weight: 700; color: var(--primary-soft); font-size: 15px; margin-right: auto; white-space: nowrap; }
    .nav-badge { background: var(--primary-dim); color: var(--primary-soft); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.05em; white-space: nowrap; }
    .nav-theme-btn { background: none; border: 1px solid #334155; color: #64748b; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
    .nav-theme-btn:hover { color: #e2e8f0; border-color: #475569; }
    .nav-logout { background: none; border: 1px solid #334155; color: #94a3b8; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
    .nav-logout:hover { color: #f1f5f9; }

    /* Tabs */
    .tabs { display: flex; gap: 0; background: #1e293b; border-bottom: 1px solid #334155; padding: 0 16px; }
    .tab { background: none; border: none; color: #64748b; font-size: 14px; font-weight: 600; padding: 14px 20px; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab:hover { color: #e2e8f0; }
    .tab.active { color: var(--primary-soft); border-bottom-color: var(--primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .content { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .global-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .gstat { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; text-align: center; }
    .gstat-num { font-size: 28px; font-weight: 800; color: var(--primary-soft); line-height: 1; }
    .gstat-label { font-size: 12px; color: #64748b; margin-top: 5px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
    .section-header h2 { font-size: 19px; font-weight: 700; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; white-space: nowrap; }
    .btn-primary { background: var(--primary); color: var(--on-primary); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    .btn-secondary:hover { background: #334155; }
    .btn-danger { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .btn-danger:hover { background: #7f1d1d; color: #fff; }
    .btn-warning { background: #1c1917; color: #fbbf24; border: 1px solid #78350f; }
    .btn-warning:hover { background: #78350f; }
    .btn-green { background: #052e16; color: #4ade80; border: 1px solid #14532d; }
    .btn-green:hover { background: #14532d; }
    .btn-sm { padding: 4px 9px; font-size: 12px; }
    .tenant-grid { display: grid; gap: 14px; }
    .tenant-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 18px; transition: border-color 0.15s; }
    .tenant-card:hover { border-color: var(--primary); }
    .tc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .tc-logo { width: 42px; height: 42px; border-radius: 9px; object-fit: cover; background: #0f172a; border: 1px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; flex-shrink: 0; }
    .tc-logo img { width: 100%; height: 100%; object-fit: cover; }
    .tc-title { font-size: 16px; font-weight: 700; }
    .tc-username { font-size: 13px; color: #64748b; margin-top: 2px; }
    .tc-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .tc-stat { background: #0f172a; border-radius: 8px; padding: 10px; text-align: center; }
    .tc-stat-num { font-size: 20px; font-weight: 800; color: var(--primary-soft); }
    .tc-stat-label { font-size: 11px; color: #64748b; }
    .tc-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-purple { background: var(--primary-dim); color: var(--primary-soft); }
    .badge-gray { background: #0f172a; color: #94a3b8; border: 1px solid #334155; }
    .badge-green { background: #052e16; color: #4ade80; }
    .badge-red { background: #450a0a; color: #f87171; }
    .badge-yellow { background: #1c1917; color: #fbbf24; }
    .badge-blue { background: #0c2340; color: #60a5fa; }
    .tc-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* Subscription info on card */
    .sub-info { background: #0f172a; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .sub-plan { font-size: 13px; font-weight: 600; color: #94a3b8; }
    .sub-expiry { font-size: 12px; color: #64748b; }
    .sub-days { font-size: 12px; font-weight: 700; }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1e293b; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; }
    .modal-lg { max-width: 680px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #334155; }
    .modal-header h3 { font-size: 15px; font-weight: 700; }
    .modal-close { background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid #334155; display: flex; justify-content: flex-end; gap: 10px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 500; color: #94a3b8; }
    input, select, textarea { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 9px 12px; color: #f1f5f9; font-size: 14px; outline: none; transition: border-color 0.15s; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    select option { background: #0f172a; }
    .divider { grid-column: 1/-1; border-top: 1px solid #334155; padding-top: 10px; margin-top: 4px; }
    .divider-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.06em; text-transform: uppercase; }
    .hint { font-size: 12px; color: #475569; }

    /* Inner modal tabs */
    .modal-tabs { display: flex; border-bottom: 1px solid #334155; margin-bottom: 20px; }
    .modal-tab { background: none; border: none; color: #64748b; font-size: 13px; font-weight: 600; padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .modal-tab:hover { color: #e2e8f0; }
    .modal-tab.active { color: var(--primary-soft); border-bottom-color: var(--primary); }
    .modal-tab-content { display: none; }
    .modal-tab-content.active { display: block; }

    /* Payment history */
    .payments-list { display: flex; flex-direction: column; gap: 10px; }
    .payment-row { background: #0f172a; border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .payment-row .pay-main { flex: 1; min-width: 120px; }
    .pay-amount { font-size: 16px; font-weight: 700; color: #4ade80; }
    .pay-meta { font-size: 12px; color: #64748b; margin-top: 2px; }
    .pay-period { font-size: 12px; font-weight: 600; color: #94a3b8; }
    .no-payments { text-align: center; padding: 24px; color: #64748b; font-size: 13px; }

    /* Register payment mini-form */
    .pay-form { background: #0f172a; border-radius: 10px; padding: 16px; margin-top: 16px; border: 1px solid #334155; }
    .pay-form h4 { font-size: 13px; font-weight: 700; margin-bottom: 14px; color: #94a3b8; }

    /* Theme panel */
    .theme-panel { position: fixed; top: 56px; right: 0; width: 260px; background: #1e293b; border: 1px solid #334155; border-top: none; border-right: none; border-radius: 0 0 0 12px; padding: 16px; z-index: 50; display: none; box-shadow: -4px 4px 20px rgba(0,0,0,0.4); }
    .theme-panel.open { display: block; }
    .theme-panel h4 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: #94a3b8; }
    .color-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .color-swatch { width: 34px; height: 34px; border-radius: 7px; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }
    .color-input-wrap { display: flex; align-items: center; gap: 8px; }
    input[type="color"] { width: 40px; height: 34px; padding: 2px 3px; cursor: pointer; border-radius: 7px; background: #0f172a; border: 1px solid #334155; flex-shrink: 0; }

    /* Calendar */
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .cal-title { font-size: 20px; font-weight: 700; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { text-align: center; font-size: 11px; font-weight: 700; color: #64748b; padding: 6px 0; text-transform: uppercase; letter-spacing: 0.05em; }
    .cal-day { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 8px; min-height: 80px; position: relative; }
    .cal-day.empty { background: transparent; border-color: transparent; }
    .cal-day.today { border-color: var(--primary); }
    .cal-day-num { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 4px; }
    .cal-day.today .cal-day-num { color: var(--primary-soft); }
    .cal-event { font-size: 10px; font-weight: 600; border-radius: 4px; padding: 2px 5px; margin-bottom: 2px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .cal-event-expiry { background: #450a0a; color: #f87171; }
    .cal-event-payment { background: #052e16; color: #4ade80; }
    .cal-event-trial { background: #1c1917; color: #fbbf24; }
    .cal-legend { display: flex; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
    .cal-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
    .cal-legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    #toast { position: fixed; bottom: 20px; right: 20px; left: 20px; max-width: 320px; margin: 0 auto; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 11px 16px; font-size: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.4); transition: all .3s; opacity: 0; transform: translateY(10px); pointer-events: none; z-index: 200; }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--primary); color: var(--primary-soft); }
    #toast.error { border-color: #ef4444; color: #ef4444; }
    .empty { text-align: center; padding: 40px; color: #64748b; font-size: 14px; }

    @media (max-width: 768px) {
      .global-stats { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
      .theme-panel { width: 100%; border-radius: 0; }
      .cal-grid { gap: 2px; }
      .cal-day { min-height: 60px; padding: 4px; }
      .cal-event { font-size: 9px; }
    }
    @media (max-width: 480px) {
      .global-stats { grid-template-columns: 1fr 1fr; }
      .cal-dow { font-size: 9px; }
      .cal-day-num { font-size: 11px; }
    }
  </style>
</head>
<body>
<nav>
  <div class="nav-brand">⚡ Super Admin</div>
  <span class="nav-badge">SUPERADMIN</span>
  <button class="nav-theme-btn" onclick="toggleThemePanel()" title="Personalizar colores">🎨</button>
  <button class="nav-logout" onclick="logout()">Salir</button>
</nav>

<!-- Theme panel -->
<div class="theme-panel" id="themePanel">
  <h4>🎨 Color del panel</h4>
  <div class="color-presets" id="saColorPresets"></div>
  <div class="color-input-wrap">
    <input type="color" id="saColorPicker" value="#7c3aed" oninput="saSaveTheme(this.value)" title="Color personalizado" />
    <span id="saColorHex" style="font-family:monospace;font-size:12px;color:#94a3b8">#7c3aed</span>
  </div>
</div>

<!-- Tab bar -->
<div class="tabs">
  <button class="tab active" onclick="setTab('negocios')">Negocios</button>
  <button class="tab" onclick="setTab('calendario')">Calendario</button>
</div>

<!-- ── TAB: NEGOCIOS ─────────────────────────────────────────── -->
<div class="tab-content active" id="tab-negocios">
  <div class="content">
    <div class="global-stats">
      <div class="gstat"><div class="gstat-num" id="g-negocios">—</div><div class="gstat-label">Negocios activos</div></div>
      <div class="gstat"><div class="gstat-num" id="g-messages">—</div><div class="gstat-label">Mensajes totales</div></div>
      <div class="gstat"><div class="gstat-num" id="g-conversations">—</div><div class="gstat-label">Conversaciones</div></div>
      <div class="gstat"><div class="gstat-num" id="g-leads" style="color:#fbbf24">—</div><div class="gstat-label">Leads totales</div></div>
    </div>
    <div class="section-header">
      <div><h2>Negocios registrados</h2><p id="tenantSubtitle" style="color:#64748b;font-size:13px;margin-top:3px"></p></div>
      <button class="btn btn-primary" onclick="openCreate()">+ Nuevo Negocio</button>
    </div>
    <div class="tenant-grid" id="tenantGrid"></div>
  </div>
</div>

<!-- ── TAB: CALENDARIO ──────────────────────────────────────── -->
<div class="tab-content" id="tab-calendario">
  <div class="content">
    <div class="cal-header">
      <button class="btn btn-secondary" onclick="calPrev()">← Anterior</button>
      <div class="cal-title" id="calTitle"></div>
      <button class="btn btn-secondary" onclick="calNext()">Siguiente →</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#450a0a;border:1px solid #7f1d1d"></div> Vencimiento</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#052e16;border:1px solid #14532d"></div> Pago registrado</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#1c1917;border:1px solid #78350f"></div> Fin de periodo prueba</div>
    </div>
  </div>
</div>

<!-- ── MODAL: NUEVO/EDITAR NEGOCIO ──────────────────────────── -->
<div class="modal-overlay" id="tenantModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Nuevo Negocio</h3>
      <button class="modal-close" onclick="closeModal('tenantModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field full"><label>Nombre del negocio *</label><input type="text" id="m_storeName" placeholder="Ej: Auto Parts Lima" /></div>
        <div class="field"><label>Usuario (login) *</label><input type="text" id="m_username" placeholder="admin@negocio" /></div>
        <div class="field">
          <label id="m_passwordLabel">Contraseña *</label>
          <input type="password" id="m_password" autocomplete="new-password" />
          <span class="hint" id="m_passwordHint"></span>
        </div>
        <div class="field full"><label>URL del sitio web</label><input type="url" id="m_websiteUrl" placeholder="https://negocio.com" /></div>
        <div class="field full"><label>URL del logo</label><input type="url" id="m_logoUrl" placeholder="https://negocio.com/logo.png" /></div>
        <div class="field full divider"><div class="divider-label">Credenciales WhatsApp (Meta)</div></div>
        <div class="field full"><label>Token de acceso *</label><input type="password" id="m_whatsappToken" autocomplete="new-password" /></div>
        <div class="field"><label>Phone Number ID *</label><input type="text" id="m_phoneNumberId" /></div>
        <div class="field"><label>Verify Token *</label><input type="text" id="m_verifyToken" /></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('tenantModal')">Cancelar</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveTenant()">Crear Negocio</button>
    </div>
  </div>
</div>

<!-- ── MODAL: SUSCRIPCIÓN ──────────────────────────────────── -->
<div class="modal-overlay" id="subModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="subModalTitle">Suscripción</h3>
      <button class="modal-close" onclick="closeModal('subModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="modal-tab active" onclick="setModalTab('sub-config')">Configurar</button>
        <button class="modal-tab" onclick="setModalTab('sub-payments')">Pagos</button>
      </div>

      <!-- Config tab -->
      <div class="modal-tab-content active" id="sub-config">
        <div class="form-grid">
          <div class="field">
            <label>Estado</label>
            <select id="sub_status">
              <option value="trial">Prueba</option>
              <option value="active">Activo</option>
              <option value="expired">Vencido</option>
              <option value="suspended">Suspendido</option>
            </select>
          </div>
          <div class="field">
            <label>Plan</label>
            <input type="text" id="sub_plan" placeholder="Básico / Pro / Premium" />
          </div>
          <div class="field">
            <label>Monto mensual</label>
            <input type="number" id="sub_amount" placeholder="0" min="0" step="0.01" />
          </div>
          <div class="field">
            <label>Moneda</label>
            <select id="sub_currency">
              <option value="MXN">MXN</option>
              <option value="USD">USD</option>
              <option value="PEN">PEN</option>
              <option value="COP">COP</option>
              <option value="ARS">ARS</option>
              <option value="CLP">CLP</option>
            </select>
          </div>
          <div class="field">
            <label>Fecha de inicio</label>
            <input type="date" id="sub_startDate" />
          </div>
          <div class="field">
            <label>Fecha de vencimiento</label>
            <input type="date" id="sub_expiresAt" />
          </div>
        </div>
        <div style="margin-top:16px;display:flex;justify-content:flex-end">
          <button class="btn btn-primary" onclick="saveSubscription()">Guardar suscripción</button>
        </div>
      </div>

      <!-- Payments tab -->
      <div class="modal-tab-content" id="sub-payments">
        <div class="payments-list" id="paymentsList"></div>

        <!-- Register payment form -->
        <div class="pay-form" id="payForm" style="display:none">
          <h4>Registrar pago</h4>
          <div class="form-grid">
            <div class="field">
              <label>Monto *</label>
              <input type="number" id="pay_amount" placeholder="0.00" min="0" step="0.01" />
            </div>
            <div class="field">
              <label>Moneda</label>
              <select id="pay_currency">
                <option value="MXN">MXN</option>
                <option value="USD">USD</option>
                <option value="PEN">PEN</option>
                <option value="COP">COP</option>
                <option value="ARS">ARS</option>
                <option value="CLP">CLP</option>
              </select>
            </div>
            <div class="field">
              <label>Método *</label>
              <select id="pay_method">
                <option value="efectivo">Efectivo</option>
                <option value="transferencia">Transferencia</option>
                <option value="tarjeta">Tarjeta</option>
                <option value="otro">Otro</option>
              </select>
            </div>
            <div class="field">
              <label>Período *</label>
              <input type="text" id="pay_period" placeholder="Mayo 2026" />
            </div>
            <div class="field">
              <label>Extender (días)</label>
              <input type="number" id="pay_days" value="30" min="1" max="365" />
            </div>
            <div class="field">
              <label>Nota</label>
              <input type="text" id="pay_note" placeholder="Opcional" />
            </div>
          </div>
          <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
            <button class="btn btn-secondary btn-sm" onclick="togglePayForm(false)">Cancelar</button>
            <button class="btn btn-green btn-sm" onclick="registerPayment()">Confirmar pago</button>
          </div>
        </div>

        <div style="margin-top:14px;display:flex;justify-content:flex-end" id="payFormToggle">
          <button class="btn btn-green btn-sm" onclick="togglePayForm(true)">+ Registrar pago</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const saToken = localStorage.getItem('sa_token');
if (!saToken) location.href = '/superadmin-login.html';

let tenants = [], editingId = null, subTenantId = null;
let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();

// ── TABS ─────────────────────────────────────────────────────────────────────
function setTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['negocios','calendario'][i] === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'calendario') renderCalendar();
}

function setModalTab(name) {
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.toggle('active', t.textContent === (name === 'sub-config' ? 'Configurar' : 'Pagos')));
  document.querySelectorAll('.modal-tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if (name === 'sub-payments') renderPayments();
}

// ── THEME ─────────────────────────────────────────────────────────────────────
const SA_PRESETS = ['#7c3aed','#3b82f6','#25d366','#f97316','#ef4444','#14b8a6','#ec4899','#eab308','#6366f1','#0ea5e9'];
function hexToRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}
function darken(hex,f=0.18){const{r,g,b}=hexToRgb(hex);return'#'+[r,g,b].map(v=>Math.max(0,Math.round(v*(1-f))).toString(16).padStart(2,'0')).join('');}
function luminance(hex){const{r,g,b}=hexToRgb(hex);return[r,g,b].map(v=>{v/=255;return v<=0.03928?v/12.92:((v+0.055)/1.055)**2.4;}).reduce((s,v,i)=>s+v*[0.2126,0.7152,0.0722][i],0);}
function toRgba(hex,a){const{r,g,b}=hexToRgb(hex);return`rgba(${r},${g},${b},${a})`;}
function saApplyTheme(color){
  const root=document.documentElement;
  root.style.setProperty('--primary',color);
  root.style.setProperty('--primary-hover',darken(color));
  root.style.setProperty('--on-primary',luminance(color)>0.35?'#0f172a':'#ffffff');
  root.style.setProperty('--primary-dim',toRgba(color,0.13));
  const {r,g,b}=hexToRgb(color);
  const soft=luminance(color)>0.35?darken(color,0.25):'#'+[Math.min(255,r+80),Math.min(255,g+80),Math.min(255,b+80)].map(v=>v.toString(16).padStart(2,'0')).join('');
  root.style.setProperty('--primary-soft',soft);
  document.getElementById('saColorPicker').value=color;
  document.getElementById('saColorHex').textContent=color;
  document.querySelectorAll('#saColorPresets .color-swatch').forEach(s=>s.classList.toggle('active',s.dataset.color===color));
}
function saSaveTheme(color){if(!/^#[0-9a-fA-F]{6}$/.test(color))return;saApplyTheme(color);localStorage.setItem('sa_theme',color);}
function renderSaPresets(){
  document.getElementById('saColorPresets').innerHTML=SA_PRESETS.map(c=>`<div class="color-swatch" style="background:${c}" data-color="${c}" onclick="saSaveTheme('${c}')"></div>`).join('');
}
function toggleThemePanel(){document.getElementById('themePanel').classList.toggle('open');}
document.addEventListener('click',e=>{const p=document.getElementById('themePanel');if(p.classList.contains('open')&&!p.contains(e.target)&&!e.target.classList.contains('nav-theme-btn'))p.classList.remove('open');});
(()=>{const c=localStorage.getItem('sa_theme');renderSaPresets();if(c)saApplyTheme(c);})();

// ── API ───────────────────────────────────────────────────────────────────────
function logout(){localStorage.removeItem('sa_token');location.href='/superadmin-login.html';}
function api(path,opts={}){
  return fetch(path,{...opts,headers:{Authorization:'Bearer '+saToken,'Content-Type':'application/json',...(opts.headers||{})}})
    .then(async r=>{
      if(r.status===401||r.status===403){logout();return;}
      const d=await r.json();
      if(!r.ok)throw new Error(d.error||r.statusText);
      return d;
    });
}
function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+type;
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2800);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){try{return new Date(iso+'T12:00:00').toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});}catch{return iso||'—';}}
function fmtMoney(amount,currency){return(currency||'MXN')+' '+Number(amount||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});}
function closeModal(id){document.getElementById(id).classList.remove('open');}

const WA_STATUS={connected:{color:'#4ade80',label:'Conectado'},qr:{color:'#60a5fa',label:'QR pendiente'},initializing:{color:'#fbbf24',label:'Iniciando'},disconnected:{color:'#f87171',label:'Desconectado'}};

// ── SUBSCRIPTION HELPERS ─────────────────────────────────────────────────────
function subStatusBadge(sub) {
  if (!sub) return '<span class="badge badge-gray">Sin suscripción</span>';
  const today = new Date(); today.setHours(0,0,0,0);
  const exp = new Date(sub.expiresAt+'T12:00:00');
  const diffDays = Math.round((exp - today) / 86400000);
  let badge = '';
  if (sub.status === 'suspended') {
    badge = '<span class="badge badge-red">Suspendido</span>';
  } else if (sub.status === 'trial') {
    badge = `<span class="badge badge-yellow">Prueba${diffDays >= 0 ? ' · '+diffDays+'d' : ' · Vencida'}</span>`;
  } else if (sub.status === 'active') {
    if (diffDays < 0) badge = '<span class="badge badge-red">Vencido</span>';
    else if (diffDays <= 7) badge = `<span class="badge badge-yellow">Vence en ${diffDays}d</span>`;
    else badge = `<span class="badge badge-green">Activo · ${diffDays}d</span>`;
  } else {
    badge = '<span class="badge badge-red">Vencido</span>';
  }
  return badge;
}

function subDaysColor(sub) {
  if (!sub || sub.status === 'suspended') return '#f87171';
  const today = new Date(); today.setHours(0,0,0,0);
  const exp = new Date(sub.expiresAt+'T12:00:00');
  const days = Math.round((exp - today) / 86400000);
  if (days < 0) return '#f87171';
  if (days <= 7) return '#fbbf24';
  return '#4ade80';
}

// ── LOAD TENANTS ─────────────────────────────────────────────────────────────
async function loadTenants(){
  tenants = await api('/superadmin/tenants');
  document.getElementById('tenantSubtitle').textContent = tenants.length + ' negocio(s)';
  const totMsg = tenants.reduce((a,t)=>a+(t.stats?.messages||0),0);
  const totConv = tenants.reduce((a,t)=>a+(t.stats?.conversations||0),0);
  const totLeads = tenants.reduce((a,t)=>a+(t.stats?.leads||0),0);
  document.getElementById('g-negocios').textContent = tenants.length;
  document.getElementById('g-messages').textContent = totMsg;
  document.getElementById('g-conversations').textContent = totConv;
  document.getElementById('g-leads').textContent = totLeads;

  const grid = document.getElementById('tenantGrid');
  if(!tenants.length){grid.innerHTML='<div class="empty">No hay negocios registrados.</div>';return;}

  grid.innerHTML = tenants.map(t=>{
    const stats = t.stats||{messages:0,conversations:0,leads:0};
    const ai = t.ai||{enabled:true};
    const ws = WA_STATUS[t.waStatus]||WA_STATUS.disconnected;
    const sub = t.subscription;
    const logoHtml = t.logoUrl
      ? `<img src="${esc(t.logoUrl)}" alt="" onerror="this.style.display='none'" />`
      : `<span>${esc(t.storeName.charAt(0))}</span>`;

    const subInfoHtml = sub ? `
      <div class="sub-info">
        <div>
          <div class="sub-plan">${esc(sub.plan||'Sin plan')}</div>
          <div class="sub-expiry">Vence: ${fmtDate(sub.expiresAt)}</div>
        </div>
        <div style="text-align:right">
          ${subStatusBadge(sub)}
          <div class="sub-expiry" style="margin-top:4px">${fmtMoney(sub.amount, sub.currency)}/mes</div>
        </div>
      </div>` : `
      <div class="sub-info" style="justify-content:center">
        <span style="color:#64748b;font-size:13px">Sin suscripción configurada</span>
      </div>`;

    return `
    <div class="tenant-card">
      <div class="tc-header">
        <div class="tc-logo">${logoHtml}</div>
        <div style="flex:1">
          <div class="tc-title">${esc(t.storeName)}</div>
          <div class="tc-username">${esc(t.username)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:${ws.color};font-weight:600">${ws.label}</div>
          <div style="font-size:11px;color:#475569;margin-top:2px">${fmtDate(t.createdAt)}</div>
        </div>
      </div>
      ${subInfoHtml}
      <div class="tc-stats">
        <div class="tc-stat"><div class="tc-stat-num">${stats.messages}</div><div class="tc-stat-label">Mensajes</div></div>
        <div class="tc-stat"><div class="tc-stat-num">${stats.conversations}</div><div class="tc-stat-label">Conversaciones</div></div>
        <div class="tc-stat"><div class="tc-stat-num" style="color:#fbbf24">${stats.leads}</div><div class="tc-stat-label">Leads</div></div>
      </div>
      <div class="tc-meta">
        <span class="badge badge-purple">${t.productCount} productos</span>
        <span class="badge badge-gray">${t.faqCount} FAQs</span>
        ${ai.enabled!==false?'<span class="badge badge-green">IA activa</span>':'<span class="badge badge-gray">IA off</span>'}
        ${t.websiteUrl?'<span class="badge badge-gray">🔗 web</span>':''}
      </div>
      <div class="tc-actions">
        <button class="btn btn-primary btn-sm" onclick="openSub('${esc(t.id)}')">💳 Suscripción</button>
        <button class="btn btn-warning btn-sm" onclick="openEdit('${esc(t.id)}')">Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTenant('${esc(t.id)}','${esc(t.storeName)}')">Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

// ── TENANT CREATE / EDIT ─────────────────────────────────────────────────────
function openCreate(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Nuevo Negocio';
  document.getElementById('modalSaveBtn').textContent='Crear Negocio';
  document.getElementById('m_passwordLabel').textContent='Contraseña *';
  document.getElementById('m_passwordHint').textContent='';
  ['m_storeName','m_username','m_password','m_websiteUrl','m_logoUrl','m_whatsappToken','m_phoneNumberId','m_verifyToken'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('tenantModal').classList.add('open');
}
function openEdit(id){
  const t=tenants.find(x=>x.id===id);if(!t)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Editar Negocio';
  document.getElementById('modalSaveBtn').textContent='Guardar cambios';
  document.getElementById('m_passwordLabel').textContent='Nueva contraseña';
  document.getElementById('m_passwordHint').textContent='Dejar vacío para no cambiar';
  document.getElementById('m_storeName').value=t.storeName||'';
  document.getElementById('m_username').value=t.username||'';
  document.getElementById('m_password').value='';
  document.getElementById('m_websiteUrl').value=t.websiteUrl||'';
  document.getElementById('m_logoUrl').value=t.logoUrl||'';
  document.getElementById('m_whatsappToken').value='';
  document.getElementById('m_phoneNumberId').value=t.phoneNumberId||'';
  document.getElementById('m_verifyToken').value=t.verifyToken||'';
  document.getElementById('tenantModal').classList.add('open');
}
document.getElementById('tenantModal').addEventListener('click',e=>{if(e.target===document.getElementById('tenantModal'))closeModal('tenantModal');});

async function saveTenant(){
  const storeName=document.getElementById('m_storeName').value.trim();
  const username=document.getElementById('m_username').value.trim();
  const password=document.getElementById('m_password').value;
  const websiteUrl=document.getElementById('m_websiteUrl').value.trim();
  const logoUrl=document.getElementById('m_logoUrl').value.trim();
  const whatsappToken=document.getElementById('m_whatsappToken').value.trim();
  const phoneNumberId=document.getElementById('m_phoneNumberId').value.trim();
  const verifyToken=document.getElementById('m_verifyToken').value.trim();
  if(!editingId&&(!storeName||!username||!password||!whatsappToken||!phoneNumberId||!verifyToken)){
    toast('Todos los campos * son requeridos','error');return;
  }
  const body={};
  if(storeName)body.storeName=storeName;if(username)body.username=username;
  if(password)body.password=password;if(websiteUrl!==undefined)body.websiteUrl=websiteUrl;
  if(logoUrl!==undefined)body.logoUrl=logoUrl;if(whatsappToken)body.whatsappToken=whatsappToken;
  if(phoneNumberId)body.phoneNumberId=phoneNumberId;if(verifyToken)body.verifyToken=verifyToken;
  try{
    if(editingId)await api('/superadmin/tenants/'+editingId,{method:'PUT',body:JSON.stringify(body)});
    else await api('/superadmin/tenants',{method:'POST',body:JSON.stringify(body)});
    toast(editingId?'Negocio actualizado':'Negocio creado');
    closeModal('tenantModal');loadTenants();
  }catch(ex){toast(ex.message,'error');}
}

async function deleteTenant(id,name){
  if(!confirm('¿Eliminar "'+name+'"?\nEsta acción no se puede deshacer.'))return;
  try{await api('/superadmin/tenants/'+id,{method:'DELETE'});toast('Negocio eliminado');loadTenants();}
  catch(ex){toast(ex.message,'error');}
}

// ── SUBSCRIPTION MODAL ────────────────────────────────────────────────────────
function openSub(id){
  subTenantId = id;
  const t = tenants.find(x=>x.id===id);
  document.getElementById('subModalTitle').textContent = 'Suscripción · ' + (t?.storeName||'');
  const sub = t?.subscription;
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('sub_status').value = sub?.status || 'trial';
  document.getElementById('sub_plan').value = sub?.plan || '';
  document.getElementById('sub_amount').value = sub?.amount ?? '';
  document.getElementById('sub_currency').value = sub?.currency || 'MXN';
  document.getElementById('sub_startDate').value = sub?.startDate || today;
  document.getElementById('sub_expiresAt').value = sub?.expiresAt || today;
  // Reset to config tab
  setModalTab('sub-config');
  togglePayForm(false);
  document.getElementById('subModal').classList.add('open');
}
document.getElementById('subModal').addEventListener('click',e=>{if(e.target===document.getElementById('subModal'))closeModal('subModal');});

async function saveSubscription(){
  const body={
    status: document.getElementById('sub_status').value,
    plan: document.getElementById('sub_plan').value.trim(),
    amount: parseFloat(document.getElementById('sub_amount').value)||0,
    currency: document.getElementById('sub_currency').value,
    startDate: document.getElementById('sub_startDate').value,
    expiresAt: document.getElementById('sub_expiresAt').value,
  };
  if(!body.startDate||!body.expiresAt){toast('Las fechas son requeridas','error');return;}
  try{
    await api('/superadmin/tenants/'+subTenantId+'/subscription',{method:'PUT',body:JSON.stringify(body)});
    toast('Suscripción actualizada');
    await loadTenants();
    // Refresh the subTenantId's subscription in modal too
    const t=tenants.find(x=>x.id===subTenantId);
    if(t?.subscription){
      document.getElementById('sub_status').value=t.subscription.status;
      document.getElementById('sub_expiresAt').value=t.subscription.expiresAt;
    }
  }catch(ex){toast(ex.message,'error');}
}

// ── PAYMENTS ─────────────────────────────────────────────────────────────────
function renderPayments(){
  const t = tenants.find(x=>x.id===subTenantId);
  const payments = t?.subscription?.payments || [];
  const list = document.getElementById('paymentsList');
  if(!payments.length){list.innerHTML='<div class="no-payments">Sin pagos registrados</div>';return;}
  const sorted = [...payments].sort((a,b)=>b.date.localeCompare(a.date));
  list.innerHTML = sorted.map(p=>`
    <div class="payment-row">
      <div class="pay-main">
        <div class="pay-amount">${fmtMoney(p.amount,p.currency)}</div>
        <div class="pay-meta">${fmtDate(p.date)} · ${esc(p.method)}${p.note?' · '+esc(p.note):''}</div>
      </div>
      <div class="pay-period">${esc(p.period)}</div>
      <button class="btn btn-danger btn-sm" onclick="deletePayment('${esc(p.id)}')">✕</button>
    </div>
  `).join('');
}

function togglePayForm(show){
  document.getElementById('payForm').style.display = show ? 'block' : 'none';
  document.getElementById('payFormToggle').style.display = show ? 'none' : 'flex';
  if(show){
    const t=tenants.find(x=>x.id===subTenantId);
    const currency=t?.subscription?.currency||'MXN';
    document.getElementById('pay_currency').value=currency;
    document.getElementById('pay_amount').value='';
    document.getElementById('pay_note').value='';
    document.getElementById('pay_days').value=30;
    // auto-fill period to current month/year
    const now=new Date();
    document.getElementById('pay_period').value=now.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
  }
}

async function registerPayment(){
  const amount=parseFloat(document.getElementById('pay_amount').value);
  const method=document.getElementById('pay_method').value;
  const period=document.getElementById('pay_period').value.trim();
  if(!amount||!period){toast('Monto y período son requeridos','error');return;}
  const body={
    amount,
    currency:document.getElementById('pay_currency').value,
    method,
    period,
    extensionDays:parseInt(document.getElementById('pay_days').value)||30,
    note:document.getElementById('pay_note').value.trim()||undefined,
  };
  try{
    const res=await api('/superadmin/tenants/'+subTenantId+'/payments',{method:'POST',body:JSON.stringify(body)});
    toast('Pago registrado. Nuevo vencimiento: '+fmtDate(res.expiresAt));
    await loadTenants();
    togglePayForm(false);
    renderPayments();
  }catch(ex){toast(ex.message,'error');}
}

async function deletePayment(payId){
  if(!confirm('¿Eliminar este pago?'))return;
  try{
    await api('/superadmin/tenants/'+subTenantId+'/payments/'+payId,{method:'DELETE'});
    toast('Pago eliminado');
    await loadTenants();
    renderPayments();
  }catch(ex){toast(ex.message,'error');}
}

// ── CALENDAR ─────────────────────────────────────────────────────────────────
const MONTHS_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_ES=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

function renderCalendar(){
  document.getElementById('calTitle').textContent = MONTHS_ES[calMonth] + ' ' + calYear;

  // Collect events for this month
  const eventMap = {}; // day -> [{type, label}]
  const today = new Date(); today.setHours(0,0,0,0);

  tenants.forEach(t=>{
    const sub = t.subscription;
    if(!sub) return;
    const storeName = t.storeName;

    // Expiry event
    const exp = new Date(sub.expiresAt+'T12:00:00');
    if(exp.getFullYear()===calYear && exp.getMonth()===calMonth){
      const d=exp.getDate();
      if(!eventMap[d])eventMap[d]=[];
      eventMap[d].push({type: sub.status==='trial' ? 'trial' : 'expiry', label: storeName});
    }

    // Payment events
    (sub.payments||[]).forEach(p=>{
      const pd=new Date(p.date+'T12:00:00');
      if(pd.getFullYear()===calYear && pd.getMonth()===calMonth){
        const d=pd.getDate();
        if(!eventMap[d])eventMap[d]=[];
        eventMap[d].push({type:'payment', label: storeName + ' +' + fmtMoney(p.amount,p.currency)});
      }
    });
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  const grid = document.getElementById('calGrid');
  let html = DAYS_ES.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  // Empty cells before first day
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const events = eventMap[d]||[];
    const eventsHtml = events.slice(0,3).map(e=>`<div class="cal-event cal-event-${e.type}" title="${esc(e.label)}">${esc(e.label)}</div>`).join('');
    const more = events.length > 3 ? `<div class="cal-event cal-event-payment">+${events.length-3} más</div>` : '';
    html+=`<div class="cal-day${isToday?' today':''}"><div class="cal-day-num">${d}</div>${eventsHtml}${more}</div>`;
  }

  grid.innerHTML = html;
}

loadTenants();
