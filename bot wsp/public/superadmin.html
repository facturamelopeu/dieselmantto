<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Super Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5/dist/css/coreui.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --primary: #7c3aed;
      --primary-hover: #6822d0;
      --on-primary: #ffffff;
      --primary-dim: rgba(124,58,237,0.13);
      --primary-soft: #a78bfa;
    }
    .sidebar { background: #1e293b !important; }
    .sidebar-brand { background: #162032 !important; border-bottom: 1px solid #334155 !important; }
    .sidebar .nav-link { color: #94a3b8 !important; border-radius: 8px; margin: 1px 8px; padding: 8px 12px; }
    .sidebar .nav-link:hover { color: #e2e8f0 !important; background: rgba(255,255,255,.07) !important; }
    .sidebar .nav-link.active { color: var(--primary-soft) !important; background: var(--primary-dim) !important; }
    .sidebar .nav-icon { color: inherit !important; font-size: 1rem; width: 1.25rem; }
    .sidebar-footer { background: #1e293b !important; border-top: 1px solid #334155 !important; }
    .header { background: #1e293b !important; border-bottom: 1px solid #334155 !important; }
    html, body { height: 100%; overflow: hidden; }
    body, .wrapper, .body { background: #0f172a !important; }
    .app-shell { display: flex; height: 100vh; }
    .sidebar { width: 256px !important; flex-shrink: 0 !important; height: 100vh !important; overflow-y: auto !important; position: relative !important; transition: transform .25s !important; }
    .wrapper { flex: 1 !important; min-width: 0 !important; height: 100vh !important; overflow-y: auto !important; display: flex !important; flex-direction: column !important; margin-left: 0 !important; }
    @media (max-width: 991px) {
      .sidebar { position: fixed !important; top: 0; left: 0; z-index: 1050; transform: translateX(-100%); }
      .sidebar.sb-open { transform: translateX(0); }
      .sb-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1049; display: none; }
      .sb-overlay.show { display: block; }
    }
    /* Tab content */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    /* Cards */
    .card-dark { background: #1e293b !important; border-color: #334155 !important; }
    .card-dark .card-header { background: #162032 !important; border-color: #334155 !important; }
    /* Custom primary */
    .btn-sa-primary { background: var(--primary) !important; color: var(--on-primary) !important; border-color: var(--primary) !important; }
    .btn-sa-primary:hover { background: var(--primary-hover) !important; border-color: var(--primary-hover) !important; }
    /* ── Text contrast improvements ── */
    body { color: #e2e8f0 !important; }
    .card-dark, .card-dark .card-body { color: #e2e8f0 !important; }
    .card-dark .card-header { color: #f1f5f9 !important; font-weight: 600; }
    h4, h5, h6 { color: #f1f5f9 !important; }
    .form-label { color: #cbd5e1 !important; font-weight: 500; }
    .form-text, .form-text.text-secondary { color: #94a3b8 !important; }
    label { color: #cbd5e1 !important; }
    p { color: #cbd5e1 !important; }
    p.text-secondary, small.text-secondary, .small.text-secondary, span.text-secondary { color: #94a3b8 !important; }
    .text-secondary { color: #94a3b8 !important; }
    table.table-dark td { color: #e2e8f0 !important; }
    table.table-dark th { color: #94a3b8 !important; }
    /* Forms */
    .form-input { background: #0f172a !important; border-color: #334155 !important; color: #f1f5f9 !important; }
    .form-input:focus { border-color: var(--primary) !important; box-shadow: 0 0 0 .2rem var(--primary-dim) !important; }
    select.form-input option { background: #0f172a; }
    /* Global stats */
    .gstat-num { font-size: 2rem; font-weight: 800; color: var(--primary-soft); line-height: 1; }
    /* Tenant card subscription strip */
    .sub-strip { background: #0f172a; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; border: 1px solid #1e3a5f; }
    /* Color picker */
    .color-presets { display: flex; flex-wrap: wrap; gap: 8px; }
    .color-swatch { width: 34px; height: 34px; border-radius: 7px; cursor: pointer; border: 3px solid transparent; transition: all .15s; }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,.25); }
    input[type="color"].color-pick { width: 40px; height: 34px; padding: 2px 3px; border-radius: 7px; background: #0f172a; border: 1px solid #334155; cursor: pointer; }
    /* Modal overlay */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: none; align-items: center; justify-content: center; z-index: 1055; padding: 16px; }
    .modal-overlay.open { display: flex; }
    /* Inner modal tabs */
    .itab-bar { display: flex; border-bottom: 1px solid #334155; margin-bottom: 20px; }
    .itab { background: none; border: none; color: #64748b; font-size: 13px; font-weight: 600; padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .itab:hover { color: #e2e8f0; }
    .itab.active { color: var(--primary-soft); border-bottom-color: var(--primary); }
    .itab-content { display: none; }
    .itab-content.active { display: block; }
    /* Payments */
    .payment-row { background: #0f172a; border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; border: 1px solid #1e293b; margin-bottom: 8px; }
    .pay-amount { font-size: 16px; font-weight: 700; color: #4ade80; }
    .pay-form { background: #0f172a; border-radius: 10px; padding: 16px; margin-top: 16px; border: 1px solid #334155; }
    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { text-align: center; font-size: 11px; font-weight: 700; color: #64748b; padding: 6px 0; text-transform: uppercase; letter-spacing: .05em; }
    .cal-day { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 6px; min-height: 76px; }
    .cal-day.empty { background: transparent; border-color: transparent; }
    .cal-day.today { border-color: var(--primary); }
    .cal-day-num { font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 3px; }
    .cal-day.today .cal-day-num { color: var(--primary-soft); }
    .cal-event { font-size: 10px; font-weight: 600; border-radius: 3px; padding: 2px 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-event-expiry { background: #450a0a; color: #f87171; }
    .cal-event-payment { background: #052e16; color: #4ade80; }
    .cal-event-trial { background: #1c1917; color: #fbbf24; }
    /* Toast */
    #toast { position: fixed; bottom: 20px; right: 20px; left: 20px; max-width: 340px; margin: 0 auto; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 11px 16px; font-size: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.4); transition: all .3s; opacity: 0; transform: translateY(10px); pointer-events: none; z-index: 1200; }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--primary); color: var(--primary-soft); }
    #toast.error { border-color: #ef4444; color: #ef4444; }
    @media (max-width: 768px) {
      .cal-day { min-height: 56px; padding: 3px; }
      .cal-event { font-size: 9px; }
    }
  </style>
</head>
<body>
<div class="app-shell">
<div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

<!-- ── SIDEBAR ─────────────────────────────────────────────────────────── -->
<div class="sidebar sidebar-dark" id="sidebar">
  <div class="sidebar-brand d-flex align-items-center px-3 py-3 gap-2">
    <i class="bi bi-lightning-fill" style="color:var(--primary-soft);font-size:1.2rem"></i>
    <span class="fw-bold" style="color:var(--primary-soft)">Super Admin</span>
  </div>
  <div class="px-3 pt-1 pb-1">
    <span class="badge" style="background:var(--primary-dim);color:var(--primary-soft);font-size:10px;letter-spacing:.06em">SUPERADMIN</span>
  </div>
  <hr class="my-2" style="border-color:#334155" />
  <ul class="sidebar-nav flex-grow-1">
    <li class="nav-item">
      <a class="nav-link active" href="#" data-tab="negocios" onclick="setTab('negocios');return false;">
        <i class="nav-icon bi bi-building"></i>Negocios
        <span class="badge bg-secondary ms-auto text-secondary" id="tenant-count-badge" style="font-size:10px"></span>
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#" data-tab="calendario" onclick="setTab('calendario');return false;">
        <i class="nav-icon bi bi-calendar3"></i>Calendario
      </a>
    </li>
  </ul>
  <div class="px-3 py-2">
    <div class="small fw-semibold mb-2" style="color:var(--primary-soft)">🎨 Color del panel</div>
    <div class="color-presets mb-2" id="saColorPresets"></div>
    <div class="d-flex align-items-center gap-2">
      <input type="color" class="color-pick" id="saColorPicker" value="#7c3aed" oninput="saSaveTheme(this.value)" />
      <code id="saColorHex" class="text-secondary" style="font-size:11px">#7c3aed</code>
    </div>
  </div>
  <div class="sidebar-footer px-3 py-2">
    <button class="btn btn-sm btn-outline-secondary w-100" onclick="logout()">
      <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
    </button>
  </div>
</div>

<!-- ── WRAPPER ────────────────────────────────────────────────────────── -->
<div class="wrapper" id="mainWrapper">
  <header class="header header-sticky p-0" style="flex-shrink:0">
    <div class="container-fluid border-bottom px-3 d-flex align-items-center" style="border-color:#334155!important;height:56px">
      <button class="header-toggler me-2" type="button" onclick="toggleSidebar()">
        <span class="header-toggler-icon"></span>
      </button>
      <span class="fw-semibold" style="font-size:14px;color:var(--primary-soft)">Panel de Administración</span>
    </div>
  </header>

  <div class="body flex-grow-1">
    <div class="container-fluid p-4">

      <!-- Global stats -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="card card-dark text-center p-3">
            <div class="gstat-num" id="g-negocios">—</div>
            <div class="text-secondary small mt-1">Negocios</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card card-dark text-center p-3">
            <div class="gstat-num" id="g-messages">—</div>
            <div class="text-secondary small mt-1">Mensajes</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card card-dark text-center p-3">
            <div class="gstat-num" id="g-conversations">—</div>
            <div class="text-secondary small mt-1">Conversaciones</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card card-dark text-center p-3">
            <div class="gstat-num" style="color:#fbbf24" id="g-leads">—</div>
            <div class="text-secondary small mt-1">Leads</div>
          </div>
        </div>
      </div>

      <!-- ── TAB: NEGOCIOS ───────────────────────────────────────────── -->
      <div class="tab-panel active" id="tab-negocios">
        <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
          <div>
            <h4 class="fw-bold mb-0">Negocios registrados</h4>
            <p class="text-secondary small mb-0" id="tenantSubtitle"></p>
          </div>
          <button class="btn btn-sm btn-sa-primary" onclick="openCreate()">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Negocio
          </button>
        </div>
        <div id="tenantGrid" class="row g-3"></div>
      </div>

      <!-- ── TAB: CALENDARIO ──────────────────────────────────────────── -->
      <div class="tab-panel" id="tab-calendario">
        <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
          <h4 class="fw-bold mb-0" id="calTitle"></h4>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-secondary" onclick="calPrev()">
              <i class="bi bi-chevron-left"></i>
            </button>
            <button class="btn btn-sm btn-outline-secondary" onclick="calNext()">
              <i class="bi bi-chevron-right"></i>
            </button>
          </div>
        </div>
        <div class="card card-dark p-3">
          <div class="cal-grid" id="calGrid"></div>
        </div>
        <div class="d-flex gap-4 mt-3 flex-wrap">
          <div class="d-flex align-items-center gap-2 small text-secondary">
            <span style="width:12px;height:12px;background:#450a0a;border:1px solid #7f1d1d;border-radius:3px;display:inline-block"></span>Vencimiento
          </div>
          <div class="d-flex align-items-center gap-2 small text-secondary">
            <span style="width:12px;height:12px;background:#052e16;border:1px solid #14532d;border-radius:3px;display:inline-block"></span>Pago registrado
          </div>
          <div class="d-flex align-items-center gap-2 small text-secondary">
            <span style="width:12px;height:12px;background:#1c1917;border:1px solid #78350f;border-radius:3px;display:inline-block"></span>Fin periodo prueba
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ── MODAL: NUEVO / EDITAR NEGOCIO ──────────────────────────────────── -->
<div class="modal-overlay" id="tenantModal">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable w-100" style="max-width:580px">
    <div class="modal-content card-dark" style="border-color:#334155">
      <div class="modal-header" style="border-color:#334155;background:#162032">
        <h5 class="modal-title fw-bold" id="modalTitle">Nuevo Negocio</h5>
        <button class="btn-close btn-close-white" onclick="closeModal('tenantModal')"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label text-secondary small mb-1">Nombre del negocio *</label>
            <input type="text" class="form-control form-control-sm form-input" id="m_storeName" placeholder="Ej: Auto Parts Lima" />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label text-secondary small mb-1">Usuario (login) *</label>
            <input type="text" class="form-control form-control-sm form-input" id="m_username" placeholder="admin@negocio" />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label text-secondary small mb-1" id="m_passwordLabel">Contraseña *</label>
            <input type="password" class="form-control form-control-sm form-input" id="m_password" autocomplete="new-password" />
            <div class="form-text text-secondary" id="m_passwordHint"></div>
          </div>
          <div class="col-12">
            <label class="form-label text-secondary small mb-1">URL del sitio web</label>
            <input type="url" class="form-control form-control-sm form-input" id="m_websiteUrl" placeholder="https://negocio.com" />
          </div>
          <div class="col-12">
            <label class="form-label text-secondary small mb-1">URL del logo</label>
            <input type="url" class="form-control form-control-sm form-input" id="m_logoUrl" placeholder="https://negocio.com/logo.png" />
          </div>
          <div class="col-12">
            <div class="text-secondary small fw-semibold text-uppercase mb-1" style="font-size:10px;letter-spacing:.06em;border-top:1px solid #334155;padding-top:10px">Credenciales WhatsApp (Meta)</div>
          </div>
          <div class="col-12">
            <label class="form-label text-secondary small mb-1">Token de acceso *</label>
            <input type="password" class="form-control form-control-sm form-input" id="m_whatsappToken" autocomplete="new-password" />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label text-secondary small mb-1">Phone Number ID *</label>
            <input type="text" class="form-control form-control-sm form-input" id="m_phoneNumberId" />
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label text-secondary small mb-1">Verify Token *</label>
            <input type="text" class="form-control form-control-sm form-input" id="m_verifyToken" />
          </div>
        </div>
      </div>
      <div class="modal-footer" style="border-color:#334155;background:#162032">
        <button class="btn btn-sm btn-outline-secondary" onclick="closeModal('tenantModal')">Cancelar</button>
        <button class="btn btn-sm btn-sa-primary" id="modalSaveBtn" onclick="saveTenant()">Crear Negocio</button>
      </div>
    </div>
  </div>
</div>

<!-- ── MODAL: SUSCRIPCIÓN ─────────────────────────────────────────────── -->
<div class="modal-overlay" id="subModal">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable w-100" style="max-width:640px">
    <div class="modal-content card-dark" style="border-color:#334155">
      <div class="modal-header" style="border-color:#334155;background:#162032">
        <h5 class="modal-title fw-bold" id="subModalTitle">Suscripción</h5>
        <button class="btn-close btn-close-white" onclick="closeModal('subModal')"></button>
      </div>
      <div class="modal-body">
        <div class="itab-bar">
          <button class="itab active" onclick="setModalTab('sub-config')">Configurar</button>
          <button class="itab" onclick="setModalTab('sub-payments')">Pagos</button>
        </div>
        <!-- Config tab -->
        <div class="itab-content active" id="sub-config">
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label text-secondary small mb-1">Estado</label>
              <select class="form-select form-select-sm form-input" id="sub_status">
                <option value="trial">Prueba</option>
                <option value="active">Activo</option>
                <option value="expired">Vencido</option>
                <option value="suspended">Suspendido</option>
              </select>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label text-secondary small mb-1">Plan</label>
              <input type="text" class="form-control form-control-sm form-input" id="sub_plan" placeholder="Básico / Pro / Premium" />
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label text-secondary small mb-1">Monto mensual</label>
              <input type="number" class="form-control form-control-sm form-input" id="sub_amount" placeholder="0" min="0" step="0.01" />
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label text-secondary small mb-1">Moneda</label>
              <select class="form-select form-select-sm form-input" id="sub_currency">
                <option value="MXN">MXN</option><option value="USD">USD</option>
                <option value="PEN">PEN</option><option value="COP">COP</option>
                <option value="ARS">ARS</option><option value="CLP">CLP</option>
              </select>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label text-secondary small mb-1">Fecha de inicio</label>
              <input type="date" class="form-control form-control-sm form-input" id="sub_startDate" />
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label text-secondary small mb-1">Fecha de vencimiento</label>
              <input type="date" class="form-control form-control-sm form-input" id="sub_expiresAt" />
            </div>
          </div>
          <div class="d-flex justify-content-end mt-3">
            <button class="btn btn-sm btn-sa-primary" onclick="saveSubscription()">
              <i class="bi bi-check-lg me-1"></i>Guardar suscripción
            </button>
          </div>
        </div>
        <!-- Payments tab -->
        <div class="itab-content" id="sub-payments">
          <div id="paymentsList"></div>
          <!-- Payment form -->
          <div class="pay-form" id="payForm" style="display:none">
            <div class="fw-semibold small text-secondary mb-3">Registrar pago</div>
            <div class="row g-2">
              <div class="col-6">
                <label class="form-label text-secondary small mb-1">Monto *</label>
                <input type="number" class="form-control form-control-sm form-input" id="pay_amount" placeholder="0.00" min="0" step="0.01" />
              </div>
              <div class="col-6">
                <label class="form-label text-secondary small mb-1">Moneda</label>
                <select class="form-select form-select-sm form-input" id="pay_currency">
                  <option value="MXN">MXN</option><option value="USD">USD</option>
                  <option value="PEN">PEN</option><option value="COP">COP</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label text-secondary small mb-1">Método *</label>
                <select class="form-select form-select-sm form-input" id="pay_method">
                  <option value="efectivo">Efectivo</option>
                  <option value="transferencia">Transferencia</option>
                  <option value="tarjeta">Tarjeta</option>
                  <option value="otro">Otro</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label text-secondary small mb-1">Período *</label>
                <input type="text" class="form-control form-control-sm form-input" id="pay_period" placeholder="Mayo 2026" />
              </div>
              <div class="col-6">
                <label class="form-label text-secondary small mb-1">Extender (días)</label>
                <input type="number" class="form-control form-control-sm form-input" id="pay_days" value="30" min="1" max="365" />
              </div>
              <div class="col-6">
                <label class="form-label text-secondary small mb-1">Nota</label>
                <input type="text" class="form-control form-control-sm form-input" id="pay_note" placeholder="Opcional" />
              </div>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-3">
              <button class="btn btn-sm btn-outline-secondary" onclick="togglePayForm(false)">Cancelar</button>
              <button class="btn btn-sm" style="background:#052e16;color:#4ade80;border:1px solid #14532d" onclick="registerPayment()">
                <i class="bi bi-check-lg me-1"></i>Confirmar pago
              </button>
            </div>
          </div>
          <div class="d-flex justify-content-end mt-3" id="payFormToggle">
            <button class="btn btn-sm" style="background:#052e16;color:#4ade80;border:1px solid #14532d" onclick="togglePayForm(true)">
              <i class="bi bi-plus-lg me-1"></i>Registrar pago
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div><!-- /wrapper -->
</div><!-- /app-shell -->

<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@coreui/coreui@5/dist/js/coreui.bundle.min.js"></script>
<script>
const saToken = localStorage.getItem('sa_token');
if (!saToken) location.href = '/superadmin-login.html';

let tenants = [], editingId = null, subTenantId = null;
let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();

// ── SIDEBAR TOGGLE ─────────────────────────────────────────────────────────
function toggleSidebar() {
  if (window.innerWidth >= 992) return;
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sbOverlay');
  const open = sb.classList.toggle('sb-open');
  ov.classList.toggle('show', open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('sb-open');
  document.getElementById('sbOverlay').classList.remove('show');
}

// ── TABS ──────────────────────────────────────────────────────────────────
function setTab(name) {
  document.querySelectorAll('.sidebar .nav-link[data-tab]').forEach(l => l.classList.toggle('active', l.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
  if (name === 'calendario') renderCalendar();
}
function setModalTab(name) {
  document.querySelectorAll('.itab').forEach(t => t.classList.toggle('active', (name==='sub-config'?'Configurar':'Pagos')===t.textContent.trim()));
  document.querySelectorAll('.itab-content').forEach(c => c.classList.toggle('active', c.id === name));
  if (name === 'sub-payments') renderPayments();
}

// ── THEME ─────────────────────────────────────────────────────────────────
const SA_PRESETS = ['#7c3aed','#3b82f6','#25d366','#f97316','#ef4444','#14b8a6','#ec4899','#eab308','#6366f1','#0ea5e9'];
function hexToRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}
function darken(hex,f=0.18){const{r,g,b}=hexToRgb(hex);return'#'+[r,g,b].map(v=>Math.max(0,Math.round(v*(1-f))).toString(16).padStart(2,'0')).join('');}
function luminance(hex){const{r,g,b}=hexToRgb(hex);return[r,g,b].map(v=>{v/=255;return v<=0.03928?v/12.92:((v+0.055)/1.055)**2.4;}).reduce((s,v,i)=>s+v*[0.2126,0.7152,0.0722][i],0);}
function toRgba(hex,a){const{r,g,b}=hexToRgb(hex);return`rgba(${r},${g},${b},${a})`;}
function saApplyTheme(color) {
  const root=document.documentElement;
  root.style.setProperty('--primary',color);
  root.style.setProperty('--primary-hover',darken(color));
  root.style.setProperty('--on-primary',luminance(color)>0.35?'#0f172a':'#ffffff');
  root.style.setProperty('--primary-dim',toRgba(color,0.13));
  const {r,g,b}=hexToRgb(color);
  const soft=luminance(color)>0.35?darken(color,0.25):'#'+[Math.min(255,r+80),Math.min(255,g+80),Math.min(255,b+80)].map(v=>v.toString(16).padStart(2,'0')).join('');
  root.style.setProperty('--primary-soft',soft);
  document.getElementById('saColorPicker').value=color;
  document.getElementById('saColorHex').textContent=color;
  document.querySelectorAll('#saColorPresets .color-swatch').forEach(s=>s.classList.toggle('active',s.dataset.color===color));
}
function saSaveTheme(color){if(!/^#[0-9a-fA-F]{6}$/.test(color))return;saApplyTheme(color);localStorage.setItem('sa_theme',color);}
(()=>{
  document.getElementById('saColorPresets').innerHTML=SA_PRESETS.map(c=>`<div class="color-swatch" style="background:${c}" data-color="${c}" onclick="saSaveTheme('${c}')"></div>`).join('');
  const c=localStorage.getItem('sa_theme');if(c)saApplyTheme(c);
})();

// ── API ───────────────────────────────────────────────────────────────────
function logout(){localStorage.removeItem('sa_token');location.href='/superadmin-login.html';}
function api(path,opts={}){
  return fetch(path,{...opts,headers:{Authorization:'Bearer '+saToken,'Content-Type':'application/json',...(opts.headers||{})}})
    .then(async r=>{
      if(r.status===401||r.status===403){logout();return;}
      const d=await r.json(); if(!r.ok)throw new Error(d.error||r.statusText); return d;
    });
}
function toast(msg,type='success'){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+type;clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2800);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){try{return new Date(iso+'T12:00:00').toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});}catch{return iso||'—';}}
function fmtMoney(a,c){return(c||'MXN')+' '+Number(a||0).toLocaleString('es-MX',{minimumFractionDigits:2});}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// ── SUBSCRIPTION HELPERS ──────────────────────────────────────────────────
function subBadge(sub) {
  if (!sub) return '<span class="badge bg-secondary">Sin suscripción</span>';
  const today=new Date();today.setHours(0,0,0,0);
  const exp=new Date(sub.expiresAt+'T12:00:00');
  const days=Math.round((exp-today)/86400000);
  if (sub.status==='suspended') return '<span class="badge bg-danger">Suspendido</span>';
  if (sub.status==='trial') return `<span class="badge bg-warning text-dark">Prueba${days>=0?' · '+days+'d':' · Vencida'}</span>`;
  if (sub.status==='active') {
    if (days<0) return '<span class="badge bg-danger">Vencido</span>';
    if (days<=7) return `<span class="badge bg-warning text-dark">Vence en ${days}d</span>`;
    return `<span class="badge bg-success">Activo · ${days}d</span>`;
  }
  return '<span class="badge bg-danger">Vencido</span>';
}

const WA_STATUS={connected:{color:'#4ade80',label:'Conectado'},qr:{color:'#60a5fa',label:'QR pendiente'},initializing:{color:'#fbbf24',label:'Iniciando'},disconnected:{color:'#f87171',label:'Desconectado'}};

// ── LOAD TENANTS ──────────────────────────────────────────────────────────
async function loadTenants() {
  tenants = await api('/superadmin/tenants');
  document.getElementById('tenantSubtitle').textContent = tenants.length + ' negocio(s)';
  document.getElementById('tenant-count-badge').textContent = tenants.length;

  const totMsg=tenants.reduce((a,t)=>a+(t.stats?.messages||0),0);
  const totConv=tenants.reduce((a,t)=>a+(t.stats?.conversations||0),0);
  const totLeads=tenants.reduce((a,t)=>a+(t.stats?.leads||0),0);
  document.getElementById('g-negocios').textContent=tenants.length;
  document.getElementById('g-messages').textContent=totMsg;
  document.getElementById('g-conversations').textContent=totConv;
  document.getElementById('g-leads').textContent=totLeads;

  const grid=document.getElementById('tenantGrid');
  if(!tenants.length){grid.innerHTML='<div class="col-12 text-center text-secondary py-5">No hay negocios registrados.</div>';return;}

  grid.innerHTML=tenants.map(t=>{
    const stats=t.stats||{messages:0,conversations:0,leads:0};
    const ai=t.ai||{enabled:true};
    const ws=WA_STATUS[t.waStatus]||WA_STATUS.disconnected;
    const sub=t.subscription;
    const logoHtml=t.logoUrl
      ?`<img src="${esc(t.logoUrl)}" alt="" style="width:40px;height:40px;border-radius:8px;object-fit:cover" onerror="this.style.display='none'" />`
      :`<div style="width:40px;height:40px;border-radius:8px;background:var(--primary-dim);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:var(--primary-soft)">${esc(t.storeName.charAt(0))}</div>`;

    const subStrip = sub
      ? `<div class="sub-strip">
          <div>
            <div class="fw-semibold small">${esc(sub.plan||'Sin plan')}</div>
            <div class="text-secondary" style="font-size:11px">Vence: ${fmtDate(sub.expiresAt)}</div>
          </div>
          <div class="text-end">
            ${subBadge(sub)}
            <div class="text-secondary" style="font-size:11px;margin-top:3px">${fmtMoney(sub.amount,sub.currency)}/mes</div>
          </div>
        </div>`
      : `<div class="sub-strip justify-content-center"><span class="text-secondary small">Sin suscripción configurada</span></div>`;

    return `<div class="col-12 col-md-6 col-xl-4">
      <div class="card card-dark h-100">
        <div class="card-body">
          <div class="d-flex align-items-start gap-3 mb-3">
            ${logoHtml}
            <div class="flex-grow-1 min-width-0">
              <div class="fw-bold">${esc(t.storeName)}</div>
              <div class="text-secondary small">${esc(t.username)}</div>
            </div>
            <div class="text-end flex-shrink-0">
              <div style="font-size:11px;color:${ws.color};font-weight:600">${ws.label}</div>
              <div class="text-secondary" style="font-size:11px">${fmtDate(t.createdAt)}</div>
            </div>
          </div>
          ${subStrip}
          <div class="row g-2 mb-3">
            <div class="col-4 text-center" style="background:#0f172a;border-radius:6px;padding:8px">
              <div class="fw-bold" style="color:var(--primary-soft)">${stats.messages}</div>
              <div class="text-secondary" style="font-size:10px">Mensajes</div>
            </div>
            <div class="col-4 text-center" style="background:#0f172a;border-radius:6px;padding:8px">
              <div class="fw-bold" style="color:var(--primary-soft)">${stats.conversations}</div>
              <div class="text-secondary" style="font-size:10px">Convs.</div>
            </div>
            <div class="col-4 text-center" style="background:#0f172a;border-radius:6px;padding:8px">
              <div class="fw-bold" style="color:#fbbf24">${stats.leads}</div>
              <div class="text-secondary" style="font-size:10px">Leads</div>
            </div>
          </div>
          <div class="d-flex flex-wrap gap-1 mb-3">
            <span class="badge" style="background:var(--primary-dim);color:var(--primary-soft)">${t.productCount} productos</span>
            <span class="badge bg-secondary">${t.faqCount} FAQs</span>
            ${ai.enabled!==false?'<span class="badge bg-success">IA activa</span>':'<span class="badge bg-secondary">IA off</span>'}
            ${t.websiteUrl?'<span class="badge bg-secondary">🔗 web</span>':''}
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-sm btn-sa-primary" onclick="openSub('${esc(t.id)}')">
              <i class="bi bi-credit-card me-1"></i>Suscripción
            </button>
            <button class="btn btn-sm btn-outline-warning" onclick="openEdit('${esc(t.id)}')">
              <i class="bi bi-pencil me-1"></i>Editar
            </button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteTenant('${esc(t.id)}','${esc(t.storeName)}')">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── TENANT CREATE / EDIT ──────────────────────────────────────────────────
function openCreate(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Nuevo Negocio';
  document.getElementById('modalSaveBtn').textContent='Crear Negocio';
  document.getElementById('m_passwordLabel').textContent='Contraseña *';
  document.getElementById('m_passwordHint').textContent='';
  ['m_storeName','m_username','m_password','m_websiteUrl','m_logoUrl','m_whatsappToken','m_phoneNumberId','m_verifyToken'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('tenantModal').classList.add('open');
}
function openEdit(id){
  const t=tenants.find(x=>x.id===id);if(!t)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Editar Negocio';
  document.getElementById('modalSaveBtn').textContent='Guardar cambios';
  document.getElementById('m_passwordLabel').textContent='Nueva contraseña';
  document.getElementById('m_passwordHint').textContent='Dejar vacío para no cambiar';
  document.getElementById('m_storeName').value=t.storeName||'';
  document.getElementById('m_username').value=t.username||'';
  document.getElementById('m_password').value='';
  document.getElementById('m_websiteUrl').value=t.websiteUrl||'';
  document.getElementById('m_logoUrl').value=t.logoUrl||'';
  document.getElementById('m_whatsappToken').value='';
  document.getElementById('m_phoneNumberId').value=t.phoneNumberId||'';
  document.getElementById('m_verifyToken').value=t.verifyToken||'';
  document.getElementById('tenantModal').classList.add('open');
}
document.getElementById('tenantModal').addEventListener('click',e=>{if(e.target===document.getElementById('tenantModal'))closeModal('tenantModal');});
document.getElementById('subModal').addEventListener('click',e=>{if(e.target===document.getElementById('subModal'))closeModal('subModal');});

async function saveTenant(){
  const storeName=document.getElementById('m_storeName').value.trim();
  const username=document.getElementById('m_username').value.trim();
  const password=document.getElementById('m_password').value;
  const websiteUrl=document.getElementById('m_websiteUrl').value.trim();
  const logoUrl=document.getElementById('m_logoUrl').value.trim();
  const whatsappToken=document.getElementById('m_whatsappToken').value.trim();
  const phoneNumberId=document.getElementById('m_phoneNumberId').value.trim();
  const verifyToken=document.getElementById('m_verifyToken').value.trim();
  if(!editingId&&(!storeName||!username||!password||!whatsappToken||!phoneNumberId||!verifyToken)){
    toast('Todos los campos * son requeridos','error');return;
  }
  const body={};
  if(storeName)body.storeName=storeName;if(username)body.username=username;
  if(password)body.password=password;if(websiteUrl!==undefined)body.websiteUrl=websiteUrl;
  if(logoUrl!==undefined)body.logoUrl=logoUrl;if(whatsappToken)body.whatsappToken=whatsappToken;
  if(phoneNumberId)body.phoneNumberId=phoneNumberId;if(verifyToken)body.verifyToken=verifyToken;
  try{
    if(editingId)await api('/superadmin/tenants/'+editingId,{method:'PUT',body:JSON.stringify(body)});
    else await api('/superadmin/tenants',{method:'POST',body:JSON.stringify(body)});
    toast(editingId?'Negocio actualizado':'Negocio creado');
    closeModal('tenantModal');loadTenants();
  }catch(ex){toast(ex.message,'error');}
}
async function deleteTenant(id,name){
  if(!confirm('¿Eliminar "'+name+'"?\nEsta acción no se puede deshacer.'))return;
  try{await api('/superadmin/tenants/'+id,{method:'DELETE'});toast('Negocio eliminado');loadTenants();}
  catch(ex){toast(ex.message,'error');}
}

// ── SUBSCRIPTION ──────────────────────────────────────────────────────────
function openSub(id){
  subTenantId=id;
  const t=tenants.find(x=>x.id===id);
  document.getElementById('subModalTitle').textContent='Suscripción · '+(t?.storeName||'');
  const sub=t?.subscription;
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('sub_status').value=sub?.status||'trial';
  document.getElementById('sub_plan').value=sub?.plan||'';
  document.getElementById('sub_amount').value=sub?.amount??'';
  document.getElementById('sub_currency').value=sub?.currency||'MXN';
  document.getElementById('sub_startDate').value=sub?.startDate||today;
  document.getElementById('sub_expiresAt').value=sub?.expiresAt||today;
  setModalTab('sub-config');
  togglePayForm(false);
  document.getElementById('subModal').classList.add('open');
}
async function saveSubscription(){
  const body={status:document.getElementById('sub_status').value,plan:document.getElementById('sub_plan').value.trim(),amount:parseFloat(document.getElementById('sub_amount').value)||0,currency:document.getElementById('sub_currency').value,startDate:document.getElementById('sub_startDate').value,expiresAt:document.getElementById('sub_expiresAt').value};
  if(!body.startDate||!body.expiresAt){toast('Las fechas son requeridas','error');return;}
  try{await api('/superadmin/tenants/'+subTenantId+'/subscription',{method:'PUT',body:JSON.stringify(body)});toast('Suscripción actualizada');await loadTenants();}catch(ex){toast(ex.message,'error');}
}

// ── PAYMENTS ──────────────────────────────────────────────────────────────
function renderPayments(){
  const t=tenants.find(x=>x.id===subTenantId);
  const payments=t?.subscription?.payments||[];
  const list=document.getElementById('paymentsList');
  if(!payments.length){list.innerHTML='<div class="text-center text-secondary py-3 small">Sin pagos registrados</div>';return;}
  const sorted=[...payments].sort((a,b)=>b.date.localeCompare(a.date));
  list.innerHTML=sorted.map(p=>`
    <div class="payment-row">
      <div class="flex-grow-1">
        <div class="pay-amount">${fmtMoney(p.amount,p.currency)}</div>
        <div class="text-secondary small">${fmtDate(p.date)} · ${esc(p.method)}${p.note?' · '+esc(p.note):''}</div>
      </div>
      <div class="fw-semibold small text-secondary">${esc(p.period)}</div>
      <button class="btn btn-sm btn-outline-danger" onclick="deletePayment('${esc(p.id)}')">
        <i class="bi bi-x"></i>
      </button>
    </div>`).join('');
}
function togglePayForm(show){
  document.getElementById('payForm').style.display=show?'block':'none';
  document.getElementById('payFormToggle').style.display=show?'none':'flex';
  if(show){
    const t=tenants.find(x=>x.id===subTenantId);
    document.getElementById('pay_currency').value=t?.subscription?.currency||'MXN';
    document.getElementById('pay_amount').value='';
    document.getElementById('pay_note').value='';
    document.getElementById('pay_days').value=30;
    const now=new Date();
    document.getElementById('pay_period').value=now.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
  }
}
async function registerPayment(){
  const amount=parseFloat(document.getElementById('pay_amount').value);
  const period=document.getElementById('pay_period').value.trim();
  if(!amount||!period){toast('Monto y período son requeridos','error');return;}
  const body={amount,currency:document.getElementById('pay_currency').value,method:document.getElementById('pay_method').value,period,extensionDays:parseInt(document.getElementById('pay_days').value)||30,note:document.getElementById('pay_note').value.trim()||undefined};
  try{const res=await api('/superadmin/tenants/'+subTenantId+'/payments',{method:'POST',body:JSON.stringify(body)});toast('Pago registrado. Nuevo vencimiento: '+fmtDate(res.expiresAt));await loadTenants();togglePayForm(false);renderPayments();}catch(ex){toast(ex.message,'error');}
}
async function deletePayment(payId){
  if(!confirm('¿Eliminar este pago?'))return;
  try{await api('/superadmin/tenants/'+subTenantId+'/payments/'+payId,{method:'DELETE'});toast('Pago eliminado');await loadTenants();renderPayments();}catch(ex){toast(ex.message,'error');}
}

// ── CALENDAR ──────────────────────────────────────────────────────────────
const MONTHS_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_ES=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function renderCalendar(){
  document.getElementById('calTitle').textContent=MONTHS_ES[calMonth]+' '+calYear;
  const eventMap={};
  const today=new Date();today.setHours(0,0,0,0);
  tenants.forEach(t=>{
    const sub=t.subscription;if(!sub)return;
    const exp=new Date(sub.expiresAt+'T12:00:00');
    if(exp.getFullYear()===calYear&&exp.getMonth()===calMonth){
      const d=exp.getDate();if(!eventMap[d])eventMap[d]=[];
      eventMap[d].push({type:sub.status==='trial'?'trial':'expiry',label:t.storeName});
    }
    (sub.payments||[]).forEach(p=>{
      const pd=new Date(p.date+'T12:00:00');
      if(pd.getFullYear()===calYear&&pd.getMonth()===calMonth){
        const d=pd.getDate();if(!eventMap[d])eventMap[d]=[];
        eventMap[d].push({type:'payment',label:t.storeName+' +'+fmtMoney(p.amount,p.currency)});
      }
    });
  });
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const grid=document.getElementById('calGrid');
  let html=DAYS_ES.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const events=eventMap[d]||[];
    const evHtml=events.slice(0,3).map(e=>`<div class="cal-event cal-event-${e.type}" title="${esc(e.label)}">${esc(e.label)}</div>`).join('');
    const more=events.length>3?`<div class="cal-event cal-event-payment">+${events.length-3} más</div>`:'';
    html+=`<div class="cal-day${isToday?' today':''}"><div class="cal-day-num">${d}</div>${evHtml}${more}</div>`;
  }
  grid.innerHTML=html;
}

loadTenants();
</script>
</body>
</html>
