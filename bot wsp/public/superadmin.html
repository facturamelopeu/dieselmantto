<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin</title>
  <style>
    :root {
      --primary: #7c3aed;
      --primary-hover: #6822d0;
      --on-primary: #ffffff;
      --primary-dim: rgba(124,58,237,0.13);
      --primary-soft: #a78bfa;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    nav { background: #1e293b; border-bottom: 2px solid var(--primary); padding: 0 16px; display: flex; align-items: center; height: 56px; gap: 10px; flex-wrap: nowrap; }
    .nav-brand { font-weight: 700; color: var(--primary-soft); font-size: 15px; margin-right: auto; white-space: nowrap; }
    .nav-badge { background: var(--primary-dim); color: var(--primary-soft); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.05em; white-space: nowrap; }
    .nav-theme-btn { background: none; border: 1px solid #334155; color: #64748b; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
    .nav-theme-btn:hover { color: #e2e8f0; border-color: #475569; }
    .nav-logout { background: none; border: 1px solid #334155; color: #94a3b8; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
    .nav-logout:hover { color: #f1f5f9; }
    .content { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .global-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .gstat { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; text-align: center; }
    .gstat-num { font-size: 28px; font-weight: 800; color: var(--primary-soft); line-height: 1; }
    .gstat-label { font-size: 12px; color: #64748b; margin-top: 5px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
    .section-header h2 { font-size: 19px; font-weight: 700; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; white-space: nowrap; }
    .btn-primary { background: var(--primary); color: var(--on-primary); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    .btn-secondary:hover { background: #334155; }
    .btn-danger { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .btn-danger:hover { background: #7f1d1d; color: #fff; }
    .btn-warning { background: #1c1917; color: #fbbf24; border: 1px solid #78350f; }
    .btn-warning:hover { background: #78350f; }
    .btn-sm { padding: 4px 9px; font-size: 12px; }
    .tenant-grid { display: grid; gap: 14px; }
    .tenant-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 18px; transition: border-color 0.15s; }
    .tenant-card:hover { border-color: var(--primary); }
    .tc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .tc-logo { width: 42px; height: 42px; border-radius: 9px; object-fit: cover; background: #0f172a; border: 1px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; flex-shrink: 0; }
    .tc-logo img { width: 100%; height: 100%; object-fit: cover; }
    .tc-title { font-size: 16px; font-weight: 700; }
    .tc-username { font-size: 13px; color: #64748b; margin-top: 2px; }
    .tc-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .tc-stat { background: #0f172a; border-radius: 8px; padding: 10px; text-align: center; }
    .tc-stat-num { font-size: 20px; font-weight: 800; color: var(--primary-soft); }
    .tc-stat-label { font-size: 11px; color: #64748b; }
    .tc-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-purple { background: var(--primary-dim); color: var(--primary-soft); }
    .badge-gray { background: #0f172a; color: #94a3b8; border: 1px solid #334155; }
    .badge-green { background: #052e16; color: #4ade80; }
    .badge-red { background: #450a0a; color: #f87171; }
    .badge-yellow { background: #1c1917; color: #fbbf24; }
    .tc-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1e293b; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #334155; }
    .modal-header h3 { font-size: 15px; font-weight: 700; }
    .modal-close { background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid #334155; display: flex; justify-content: flex-end; gap: 10px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 500; color: #94a3b8; }
    input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 9px 12px; color: #f1f5f9; font-size: 14px; outline: none; transition: border-color 0.15s; width: 100%; }
    input:focus { border-color: var(--primary); }
    .divider { grid-column: 1/-1; border-top: 1px solid #334155; padding-top: 10px; margin-top: 4px; }
    .divider-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.06em; text-transform: uppercase; }
    .hint { font-size: 12px; color: #475569; }
    /* Theme panel */
    .theme-panel { position: fixed; top: 56px; right: 0; width: 260px; background: #1e293b; border: 1px solid #334155; border-top: none; border-right: none; border-radius: 0 0 0 12px; padding: 16px; z-index: 50; display: none; box-shadow: -4px 4px 20px rgba(0,0,0,0.4); }
    .theme-panel.open { display: block; }
    .theme-panel h4 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: #94a3b8; }
    .color-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .color-swatch { width: 34px; height: 34px; border-radius: 7px; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }
    .color-input-wrap { display: flex; align-items: center; gap: 8px; }
    input[type="color"] { width: 40px; height: 34px; padding: 2px 3px; cursor: pointer; border-radius: 7px; background: #0f172a; border: 1px solid #334155; flex-shrink: 0; }
    #toast { position: fixed; bottom: 20px; right: 20px; left: 20px; max-width: 320px; margin: 0 auto; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 11px 16px; font-size: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.4); transition: all .3s; opacity: 0; transform: translateY(10px); pointer-events: none; z-index: 200; }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--primary); color: var(--primary-soft); }
    #toast.error { border-color: #ef4444; color: #ef4444; }
    .empty { text-align: center; padding: 40px; color: #64748b; font-size: 14px; }
    @media (max-width: 768px) { .global-stats { grid-template-columns: repeat(2, 1fr); } .form-grid { grid-template-columns: 1fr; } .theme-panel { width: 100%; border-radius: 0; } }
    @media (max-width: 400px) { .global-stats { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<nav>
  <div class="nav-brand">⚡ Super Admin</div>
  <span class="nav-badge">SUPERADMIN</span>
  <button class="nav-theme-btn" onclick="toggleThemePanel()" title="Personalizar colores">🎨</button>
  <button class="nav-logout" onclick="logout()">Salir</button>
</nav>
<!-- Theme panel -->
<div class="theme-panel" id="themePanel">
  <h4>🎨 Color del panel</h4>
  <div class="color-presets" id="saColorPresets"></div>
  <div class="color-input-wrap">
    <input type="color" id="saColorPicker" value="#7c3aed" oninput="saSaveTheme(this.value)" title="Color personalizado" />
    <span id="saColorHex" style="font-family:monospace;font-size:12px;color:#94a3b8">#7c3aed</span>
  </div>
</div>
<div class="content">

  <!-- Global stats -->
  <div class="global-stats">
    <div class="gstat"><div class="gstat-num" id="g-negocios">—</div><div class="gstat-label">Negocios activos</div></div>
    <div class="gstat"><div class="gstat-num" id="g-messages">—</div><div class="gstat-label">Mensajes totales</div></div>
    <div class="gstat"><div class="gstat-num" id="g-conversations">—</div><div class="gstat-label">Conversaciones</div></div>
    <div class="gstat"><div class="gstat-num" id="g-leads" style="color:#fbbf24">—</div><div class="gstat-label">Leads totales</div></div>
  </div>

  <div class="section-header">
    <div><h2>Negocios registrados</h2><p id="tenantSubtitle"></p></div>
    <button class="btn btn-primary" onclick="openCreate()">+ Nuevo Negocio</button>
  </div>

  <div class="tenant-grid" id="tenantGrid"></div>
</div>

<!-- TENANT MODAL -->
<div class="modal-overlay" id="tenantModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Nuevo Negocio</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field full"><label>Nombre del negocio *</label><input type="text" id="m_storeName" placeholder="Ej: Auto Parts Lima" /></div>
        <div class="field"><label>Usuario (login) *</label><input type="text" id="m_username" placeholder="admin@negocio" /></div>
        <div class="field">
          <label id="m_passwordLabel">Contraseña *</label>
          <input type="password" id="m_password" autocomplete="new-password" />
          <span class="hint" id="m_passwordHint"></span>
        </div>
        <div class="field full"><label>URL del sitio web</label><input type="url" id="m_websiteUrl" placeholder="https://negocio.com" /></div>
        <div class="field full"><label>URL del logo</label><input type="url" id="m_logoUrl" placeholder="https://negocio.com/logo.png" /></div>
        <div class="field full divider"><div class="divider-label">Credenciales WhatsApp (Meta)</div></div>
        <div class="field full"><label>Token de acceso *</label><input type="password" id="m_whatsappToken" autocomplete="new-password" /></div>
        <div class="field"><label>Phone Number ID *</label><input type="text" id="m_phoneNumberId" /></div>
        <div class="field"><label>Verify Token *</label><input type="text" id="m_verifyToken" /></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveTenant()">Crear Negocio</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const saToken = localStorage.getItem('sa_token');
if (!saToken) location.href = '/superadmin-login.html';

let tenants = [], editingId = null;

// ── THEME ─────────────────────────────────────────────────────────────────────
const SA_PRESETS = [
  '#7c3aed','#3b82f6','#25d366','#f97316','#ef4444','#14b8a6','#ec4899','#eab308','#6366f1','#0ea5e9'
];
function hexToRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}
function darken(hex,f=0.18){const{r,g,b}=hexToRgb(hex);return'#'+[r,g,b].map(v=>Math.max(0,Math.round(v*(1-f))).toString(16).padStart(2,'0')).join('');}
function luminance(hex){const{r,g,b}=hexToRgb(hex);return[r,g,b].map(v=>{v/=255;return v<=0.03928?v/12.92:((v+0.055)/1.055)**2.4;}).reduce((s,v,i)=>s+v*[0.2126,0.7152,0.0722][i],0);}
function toRgba(hex,a){const{r,g,b}=hexToRgb(hex);return`rgba(${r},${g},${b},${a})`;}

function saApplyTheme(color){
  const root=document.documentElement;
  root.style.setProperty('--primary',color);
  root.style.setProperty('--primary-hover',darken(color));
  root.style.setProperty('--on-primary',luminance(color)>0.35?'#0f172a':'#ffffff');
  root.style.setProperty('--primary-dim',toRgba(color,0.13));
  const soft=luminance(color)>0.35?darken(color,0.25):'#'+[hexToRgb(color)].map(({r,g,b})=>[Math.min(255,r+80),Math.min(255,g+80),Math.min(255,b+80)].map(v=>v.toString(16).padStart(2,'0')).join(''))[0];
  root.style.setProperty('--primary-soft',soft);
  document.getElementById('saColorPicker').value=color;
  document.getElementById('saColorHex').textContent=color;
  document.querySelectorAll('#saColorPresets .color-swatch').forEach(s=>s.classList.toggle('active',s.dataset.color===color));
}
function saSaveTheme(color){if(!/^#[0-9a-fA-F]{6}$/.test(color))return;saApplyTheme(color);localStorage.setItem('sa_theme',color);}
function renderSaPresets(){
  document.getElementById('saColorPresets').innerHTML=SA_PRESETS.map(c=>`<div class="color-swatch" style="background:${c}" data-color="${c}" onclick="saSaveTheme('${c}')"></div>`).join('');
}
function toggleThemePanel(){document.getElementById('themePanel').classList.toggle('open');}
document.addEventListener('click',e=>{const p=document.getElementById('themePanel');if(p.classList.contains('open')&&!p.contains(e.target)&&!e.target.classList.contains('nav-theme-btn'))p.classList.remove('open');});

// Apply saved theme on load
(()=>{const c=localStorage.getItem('sa_theme');renderSaPresets();if(c)saApplyTheme(c);})();

function logout() { localStorage.removeItem('sa_token'); location.href = '/superadmin-login.html'; }

function api(path, opts = {}) {
  return fetch(path, {
    ...opts,
    headers: { Authorization: 'Bearer ' + saToken, 'Content-Type': 'application/json', ...(opts.headers||{}) },
  }).then(async r => {
    if (r.status === 401 || r.status === 403) { logout(); return; }
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || r.statusText);
    return d;
  });
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(el._t); el._t = setTimeout(() => el.className = '', 2800);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso) { try { return new Date(iso).toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'}); } catch { return iso||'—'; } }

const WA_STATUS = { connected: {color:'#4ade80',label:'Conectado'}, qr: {color:'#60a5fa',label:'QR pendiente'}, initializing: {color:'#fbbf24',label:'Iniciando'}, disconnected: {color:'#f87171',label:'Desconectado'} };

async function loadTenants() {
  tenants = await api('/superadmin/tenants');
  document.getElementById('tenantSubtitle').textContent = tenants.length + ' negocio(s)';

  // Global stats
  const totMsg = tenants.reduce((a,t) => a+(t.stats?.messages||0), 0);
  const totConv = tenants.reduce((a,t) => a+(t.stats?.conversations||0), 0);
  const totLeads = tenants.reduce((a,t) => a+(t.stats?.leads||0), 0);
  document.getElementById('g-negocios').textContent = tenants.length;
  document.getElementById('g-messages').textContent = totMsg;
  document.getElementById('g-conversations').textContent = totConv;
  document.getElementById('g-leads').textContent = totLeads;

  const grid = document.getElementById('tenantGrid');
  if (!tenants.length) { grid.innerHTML = '<div class="empty">No hay negocios registrados.</div>'; return; }

  grid.innerHTML = tenants.map(t => {
    const stats = t.stats || {messages:0,conversations:0,leads:0};
    const ai = t.ai || {enabled:true};
    const ws = WA_STATUS[t.waStatus] || WA_STATUS.disconnected;
    const logoHtml = t.logoUrl
      ? `<img src="${esc(t.logoUrl)}" alt="" onerror="this.style.display='none'" />`
      : `<span>${esc(t.storeName.charAt(0))}</span>`;
    return `
    <div class="tenant-card">
      <div class="tc-header">
        <div class="tc-logo">${logoHtml}</div>
        <div style="flex:1">
          <div class="tc-title">${esc(t.storeName)}</div>
          <div class="tc-username">${esc(t.username)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:${ws.color};font-weight:600">${ws.label}</div>
          <div style="font-size:11px;color:#475569;margin-top:2px">${fmtDate(t.createdAt)}</div>
        </div>
      </div>
      <div class="tc-stats">
        <div class="tc-stat"><div class="tc-stat-num">${stats.messages}</div><div class="tc-stat-label">Mensajes</div></div>
        <div class="tc-stat"><div class="tc-stat-num">${stats.conversations}</div><div class="tc-stat-label">Conversaciones</div></div>
        <div class="tc-stat"><div class="tc-stat-num" style="color:#fbbf24">${stats.leads}</div><div class="tc-stat-label">Leads</div></div>
      </div>
      <div class="tc-meta">
        <span class="badge badge-purple">${t.productCount} productos</span>
        <span class="badge badge-gray">${t.faqCount} FAQs</span>
        ${ai.enabled!==false ? '<span class="badge badge-green">IA activa</span>' : '<span class="badge badge-gray">IA off</span>'}
        ${t.websiteUrl ? `<span class="badge badge-gray">🔗 web</span>` : ''}
      </div>
      <div class="tc-actions">
        <button class="btn btn-warning btn-sm" onclick="openEdit('${esc(t.id)}')">Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTenant('${esc(t.id)}','${esc(t.storeName)}')">Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

function openCreate() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Nuevo Negocio';
  document.getElementById('modalSaveBtn').textContent = 'Crear Negocio';
  document.getElementById('m_passwordLabel').textContent = 'Contraseña *';
  document.getElementById('m_passwordHint').textContent = '';
  ['m_storeName','m_username','m_password','m_websiteUrl','m_logoUrl','m_whatsappToken','m_phoneNumberId','m_verifyToken'].forEach(i => document.getElementById(i).value='');
  document.getElementById('tenantModal').classList.add('open');
}

function openEdit(id) {
  const t = tenants.find(x => x.id===id); if (!t) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Editar Negocio';
  document.getElementById('modalSaveBtn').textContent = 'Guardar cambios';
  document.getElementById('m_passwordLabel').textContent = 'Nueva contraseña';
  document.getElementById('m_passwordHint').textContent = 'Dejar vacío para no cambiar';
  document.getElementById('m_storeName').value = t.storeName||'';
  document.getElementById('m_username').value = t.username||'';
  document.getElementById('m_password').value = '';
  document.getElementById('m_websiteUrl').value = t.websiteUrl||'';
  document.getElementById('m_logoUrl').value = t.logoUrl||'';
  document.getElementById('m_whatsappToken').value = '';
  document.getElementById('m_phoneNumberId').value = t.phoneNumberId||'';
  document.getElementById('m_verifyToken').value = t.verifyToken||'';
  document.getElementById('tenantModal').classList.add('open');
}

function closeModal() { document.getElementById('tenantModal').classList.remove('open'); }
document.getElementById('tenantModal').addEventListener('click', e => { if(e.target===document.getElementById('tenantModal')) closeModal(); });

async function saveTenant() {
  const storeName = document.getElementById('m_storeName').value.trim();
  const username = document.getElementById('m_username').value.trim();
  const password = document.getElementById('m_password').value;
  const websiteUrl = document.getElementById('m_websiteUrl').value.trim();
  const logoUrl = document.getElementById('m_logoUrl').value.trim();
  const whatsappToken = document.getElementById('m_whatsappToken').value.trim();
  const phoneNumberId = document.getElementById('m_phoneNumberId').value.trim();
  const verifyToken = document.getElementById('m_verifyToken').value.trim();
  if (!editingId && (!storeName||!username||!password||!whatsappToken||!phoneNumberId||!verifyToken)) {
    toast('Todos los campos * son requeridos','error'); return;
  }
  const body = {};
  if (storeName) body.storeName=storeName; if (username) body.username=username;
  if (password) body.password=password; if (websiteUrl!==undefined) body.websiteUrl=websiteUrl;
  if (logoUrl!==undefined) body.logoUrl=logoUrl;
  if (whatsappToken) body.whatsappToken=whatsappToken;
  if (phoneNumberId) body.phoneNumberId=phoneNumberId; if (verifyToken) body.verifyToken=verifyToken;
  try {
    if (editingId) await api('/superadmin/tenants/'+editingId,{method:'PUT',body:JSON.stringify(body)});
    else await api('/superadmin/tenants',{method:'POST',body:JSON.stringify(body)});
    toast(editingId?'Negocio actualizado':'Negocio creado');
    closeModal(); loadTenants();
  } catch(ex) { toast(ex.message,'error'); }
}

async function deleteTenant(id, name) {
  if (!confirm('¿Eliminar "'+name+'"?\nEsta acción no se puede deshacer.')) return;
  try { await api('/superadmin/tenants/'+id,{method:'DELETE'}); toast('Negocio eliminado'); loadTenants(); }
  catch(ex) { toast(ex.message,'error'); }
}

loadTenants();
</script>
</body>
</html>
