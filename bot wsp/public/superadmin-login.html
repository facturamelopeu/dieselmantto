<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      border: 1px solid #4c1d95;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(124,58,237,0.15);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      width: 56px; height: 56px;
      background: #4c1d95;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 12px;
    }
    .logo h1 { color: #f1f5f9; font-size: 20px; font-weight: 700; }
    .logo p { color: #64748b; font-size: 13px; margin-top: 4px; }
    .badge {
      display: inline-block;
      background: #4c1d95;
      color: #c4b5fd;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.08em;
      margin-top: 6px;
    }
    .field { margin-bottom: 20px; }
    label { display: block; color: #94a3b8; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 11px 14px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #7c3aed; }
    button {
      width: 100%;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #2d1b69; color: #6d28d9; cursor: not-allowed; }
    .error {
      background: #450a0a; border: 1px solid #7f1d1d;
      color: #fca5a5; border-radius: 8px;
      padding: 10px 14px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .back { text-align: center; margin-top: 20px; }
    .back a { color: #64748b; font-size: 13px; text-decoration: none; }
    .back a:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <h1>Super Admin</h1>
      <div class="badge">ACCESO RESTRINGIDO</div>
    </div>
    <div class="error" id="errorMsg"></div>
    <form id="loginForm">
      <div class="field">
        <label for="adminToken">Token de Super Admin</label>
        <input type="password" id="adminToken" placeholder="••••••••••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" id="btn">Ingresar</button>
    </form>
    <div class="back"><a href="/">← Volver al panel de tienda</a></div>
  </div>
  <script>
    if (localStorage.getItem('sa_token')) location.href = '/superadmin.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Verificando...';
      try {
        const res = await fetch('/auth/superadmin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: document.getElementById('adminToken').value }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Token incorrecto');
        localStorage.setItem('sa_token', data.token);
        location.href = '/superadmin.html';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
