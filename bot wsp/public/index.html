<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Admin Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: #25d366;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
    }
    .logo h1 { color: #f1f5f9; font-size: 20px; font-weight: 700; }
    .logo p { color: #64748b; font-size: 13px; margin-top: 4px; }
    label { display: block; color: #94a3b8; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .field { margin-bottom: 18px; }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 11px 14px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #25d366; }
    button {
      width: 100%;
      background: #25d366;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    button:hover { background: #1fba56; }
    button:disabled { background: #1e4a2e; color: #4a7c59; cursor: not-allowed; }
    .error {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">💬</div>
      <h1>WhatsApp Bot</h1>
      <p>Panel de Administración</p>
    </div>
    <div class="error" id="errorMsg"></div>
    <form id="loginForm">
      <div class="field">
        <label for="username">Usuario</label>
        <input type="text" id="username" placeholder="admin@empresa" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" id="btn">Ingresar</button>
    </form>
  </div>
  <script>
    if (localStorage.getItem('wsp_token')) location.href = '/admin.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Credenciales incorrectas');
        localStorage.setItem('wsp_token', data.token);
        localStorage.setItem('wsp_store', data.storeName);
        location.href = '/admin.html';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
